<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="My Health"/>
  <title>My Health</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #fdf6f0; font-family: 'DM Sans', sans-serif; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #e0c0cc; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #b85c82; cursor: pointer; box-shadow: 0 2px 8px rgba(184,92,130,0.4); }
    input:focus, textarea:focus, button:focus { outline: none; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Design tokens ────────────────────────────────────────────────
const C = {
  bg:        "#fdf6f0",   // warm cream background
  bgCard:    "#ffffff",
  bgSoft:    "#fef9f5",   // slightly warmer card bg
  blush:     "#e8a8bc",
  blushDeep: "#b85c82",
  blushLight:"#fdeef3",   // very light blush
  lavender:  "#9b84c0",
  lavLight:  "#f0eaf7",   // light lavender bg
  sage:      "#6a9a6a",
  sageLight: "#eef4ee",
  peach:     "#f4b89a",   // warm peach accent
  peachLight:"#fef1eb",
  gold:      "#b8843a",
  goldLight: "#fdf3e7",
  text:      "#1e1018",
  textSoft:  "#5a3a48",
  textLight: "#7a5060",
  border:    "#e0c0cc",
  borderSoft:"#f7eff3",
};

const CYCLE_PHASES = [
  { name:"Menstrual", days:[1,5], color:"#b85c82", bg:"#fdeef3", emoji:"🌸",
    exercise:"Gentle movement — yoga, stretching, short walks. Honor rest.",
    food:"Iron-rich foods: lentils, leafy greens, red meat. Warm, nourishing meals.",
    supplements:"Iron, Magnesium, Vitamin C to aid iron absorption.",
    sleep:"Prioritize extra sleep. Your body is working hard." },
  { name:"Follicular", days:[6,13], color:"#4a8a4a", bg:"#eef4ee", emoji:"🌱",
    exercise:"Energy is rising — great for strength training, cardio, trying new workouts.",
    food:"Lighter foods: salads, lean proteins, fermented foods for gut health.",
    supplements:"B vitamins, Zinc, Probiotics.",
    sleep:"Sleep quality improves. Still aim for 7–9 hrs." },
  { name:"Ovulation", days:[14,16], color:"#b8843a", bg:"#fdf3e7", emoji:"✨",
    exercise:"Peak energy — push yourself. HIIT, heavy lifts, competitive sports.",
    food:"Anti-inflammatory: berries, flaxseed, fiber-rich veg. Stay hydrated.",
    supplements:"Vitamin E, Antioxidants, Omega-3.",
    sleep:"May notice lighter sleep. Wind down well." },
  { name:"Luteal", days:[17,35], color:"#7055a8", bg:"#f3eef9", emoji:"🌙",
    exercise:"Slow down gradually. Pilates, swimming, moderate walks. Listen to your body.",
    food:"Complex carbs, magnesium-rich foods: dark chocolate, pumpkin seeds, bananas.",
    supplements:"Magnesium, Vitamin B6, Evening Primrose Oil.",
    sleep:"Sleep may be disrupted pre-period. Limit screens, caffeine after noon." },
];

const TABS = ["Home","Log","Sleep","Fitness","Body","Insights"];
const TAB_ICONS = ["🏠","📝","🌙","🏃","✨","💡"];
const STORAGE_KEY = "my_health_james_v2";
const F = "'DM Sans', sans-serif";
const FS = "'Cormorant Garamond', serif";

// ── Helpers ──────────────────────────────────────────────────────

function getCyclePhase(day) {
  if (!day||day<1) return null;
  for (const p of CYCLE_PHASES) if (day>=p.days[0]&&day<=p.days[1]) return p;
  return CYCLE_PHASES[3];
}

const todayStr = () => new Date().toISOString().split("T")[0];
function offsetDate(offset) { const d=new Date(); d.setDate(d.getDate()+offset); return d.toISOString().split("T")[0]; }
function daysBetween(a,b) { return Math.round((new Date(a+"T00:00:00")-new Date(b+"T00:00:00"))/86400000); }
function calcCycleDay(sel,start) { if(!start) return null; const d=daysBetween(sel,start); return d<0?null:d+1; }

function formatDateLabel(s) {
  const t=todayStr(),y=offsetDate(-1);
  if(s===t) return "Today"; if(s===y) return "Yesterday";
  return new Date(s+"T00:00:00").toLocaleDateString("default",{weekday:"short",month:"short",day:"numeric"});
}
function formatDateFull(s) { return new Date(s+"T00:00:00").toLocaleDateString("default",{weekday:"long",month:"long",day:"numeric"}); }

function parseWeight(val) { if(!val&&val!==0) return null; const n=parseFloat(String(val).replace(",",".")); return isNaN(n)?null:n; }
function formatWeight(val) { const n=parseWeight(val); if(n===null) return null; return Number.isInteger(n)?n.toString():n.toFixed(2).replace(/\.?0+$/,""); }
function calcBMI(w,h) { const ww=parseWeight(w),hh=parseFloat(h); if(!ww||!hh) return null; return (ww/((hh/100)*(hh/100))).toFixed(1); }

const pct = val => { const n=parseFloat(val); return isNaN(n)?0:n; };
function avg(arr,key) { const v=arr.map(d=>parseFloat(typeof d==="object"?d[key]:d)).filter(v=>!isNaN(v)); return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):null; }
function sumArr(arr,key) { return arr.map(d=>parseFloat(d[key])).filter(v=>!isNaN(v)).reduce((a,b)=>a+b,0); }
const countYes=(arr,key)=>arr.filter(d=>d[key]===true).length;

function getWeekDates(offset=0) {
  const now=new Date(),monday=new Date(now);
  monday.setDate(now.getDate()-((now.getDay()+6)%7)+offset*7);
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(d.toISOString().split("T")[0]);}
  return days;
}

function loadData() { try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):{}}catch{return{}} }
function saveData(d) { try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch{} }
function loadProfile() { try{const r=localStorage.getItem(STORAGE_KEY+"_profile");return r?JSON.parse(r):{height:"165",cycleStartDate:null,cycleHistory:[]}}catch{return{height:"165",cycleStartDate:null,cycleHistory:[]}} }
function saveProfile(p) { try{localStorage.setItem(STORAGE_KEY+"_profile",JSON.stringify(p))}catch{} }

function emptyDay() {
  return { sleep:{hrs:"",mins:"",rem:"",deep:"",light:"",awake:""},fitness:{gym:null,steps:"",restDay:false,walk:null,water:""},body:{weight:"",mood:"",energy:"",periodStart:false},notes:"",morningNote:"",eveningNote:"",photos:[] };
}
function emptyWeeklyBody() {
  return {weight:"",bmi:"",bodyFat:"",bodyFatMass:"",muscleMass:"",skeletalMuscle:"",leanBodyMass:"",water:"",visceralFat:"",bmr:"",boneMass:"",protein:"",subcutaneousFat:"",bodyAge:"",bodyType:""};
}

function calcLogStreak(data) { let s=0;const d=new Date();for(let i=0;i<365;i++){const k=d.toISOString().split("T")[0];if(data[k]){s++;d.setDate(d.getDate()-1);}else break;}return s; }
function calcGymStreak(data) { let s=0;const d=new Date();for(let i=0;i<365;i++){const k=d.toISOString().split("T")[0];const e=data[k];if(!e){d.setDate(d.getDate()-1);if(i>0)break;continue;}if(e.fitness?.gym===true){s++;d.setDate(d.getDate()-1);}else break;}return s; }
function calcWaterStreak(data,t=4) { let s=0;const d=new Date();for(let i=0;i<365;i++){const k=d.toISOString().split("T")[0];const e=data[k];if(e&&parseInt(e.fitness?.water||0)>=t){s++;d.setDate(d.getDate()-1);}else break;}return s; }

function generateInsights(data) {
  const ins=[],entries=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));
  if(entries.length<5) return [];
  const ws=entries.filter(([,d])=>d.fitness?.walk===true&&d.sleep?.hrs).map(([,d])=>parseFloat(d.sleep.hrs)).filter(v=>!isNaN(v));
  const nws=entries.filter(([,d])=>d.fitness?.walk===false&&d.sleep?.hrs).map(([,d])=>parseFloat(d.sleep.hrs)).filter(v=>!isNaN(v));
  if(ws.length>=3&&nws.length>=3){const wA=ws.reduce((a,b)=>a+b,0)/ws.length,nA=nws.reduce((a,b)=>a+b,0)/nws.length;if(wA-nA>0.3)ins.push({icon:"🚶",text:`You sleep ${(wA-nA).toFixed(1)} hrs more on days you walk outside.`});}
  const gm=entries.filter(([,d])=>d.fitness?.gym===true&&d.body?.mood).map(([,d])=>parseFloat(d.body.mood)).filter(v=>!isNaN(v));
  const ngm=entries.filter(([,d])=>d.fitness?.gym===false&&d.body?.mood).map(([,d])=>parseFloat(d.body.mood)).filter(v=>!isNaN(v));
  if(gm.length>=3&&ngm.length>=3){const gA=gm.reduce((a,b)=>a+b,0)/gm.length,nA=ngm.reduce((a,b)=>a+b,0)/ngm.length;if(gA-nA>0.5)ins.push({icon:"🏋️",text:`Your mood is ${(gA-nA).toFixed(1)} pts higher on gym days.`});}
  const sh=entries.filter(([,d])=>d.sleep?.hrs).map(([,d])=>parseFloat(d.sleep.hrs)).filter(v=>!isNaN(v));
  if(sh.length>=7){const sA=(sh.reduce((a,b)=>a+b,0)/sh.length).toFixed(1);ins.push({icon:"😴",text:parseFloat(sA)<7?`Your avg sleep is ${sA} hrs. Aim for 7–9 hrs for optimal recovery.`:`You average ${sA} hrs of sleep. Beautiful consistency.`});}
  const wd=entries.filter(([,d])=>parseInt(d.fitness?.water||0)>=4).length;
  if(entries.length>=5){const p=Math.round((wd/entries.length)*100);ins.push({icon:"💧",text:p>=70?`You hit your water goal ${p}% of days. Excellent habit.`:`You hit your water goal ${p}% of days. Keep a bottle visible.`});}
  return ins.slice(0,6);
}

function exportCSV(data) {
  const rows=[["Date","Sleep Hrs","Sleep Mins","REM%","Deep%","Light%","Awake%","Gym","Steps","Rest Day","Walk","Water","Weight","Mood","Energy","Morning Note","Evening Note","Notes"]];
  for(const [date,d] of Object.entries(data).sort(([a],[b])=>a.localeCompare(b)))
    rows.push([date,d.sleep?.hrs||"",d.sleep?.mins||"",d.sleep?.rem||"",d.sleep?.deep||"",d.sleep?.light||"",d.sleep?.awake||"",d.fitness?.gym===true?"Yes":d.fitness?.gym===false?"No":"",d.fitness?.steps||"",d.fitness?.restDay?"Yes":"No",d.fitness?.walk===true?"Yes":d.fitness?.walk===false?"No":"",d.fitness?.water||"",d.body?.weight||"",d.body?.mood||"",d.body?.energy||"",`"${(d.morningNote||"").replace(/"/g,'""')}"`,`"${(d.eveningNote||"").replace(/"/g,'""')}"`,`"${(d.notes||"").replace(/"/g,'""')}"`]);
  const csv=rows.map(r=>r.join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}),url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download="my-health-data.csv";a.click();URL.revokeObjectURL(url);
}

// ── UI Primitives ────────────────────────────────────────────────

function Label({children,color}) {
  return <p style={{fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:color||C.textLight,marginBottom:7,fontFamily:F,fontWeight:600}}>{children}</p>;
}

function Card({children,style={}}) {
  return <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:20,padding:"20px 22px",marginBottom:12,boxShadow:"0 2px 16px rgba(201,120,154,0.06)",...style}}>{children}</div>;
}

function SectionTitle({children,color}) {
  return <p style={{fontFamily:FS,fontSize:22,color:color||C.text,marginBottom:14,marginTop:2,fontWeight:500,lineHeight:1.2}}>{children}</p>;
}

function TextInput({value,onChange,placeholder,style={}}) {
  return <input type="text" inputMode="decimal" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{border:`1.5px solid ${C.border}`,borderRadius:12,padding:"11px 14px",fontSize:14,fontFamily:F,color:C.text,background:C.bgSoft,width:"100%",boxSizing:"border-box",outline:"none",...style}}/>;
}

function NumInput({value,onChange,placeholder,min=0,max,inputMode="numeric",style={}}) {
  return <input type="number" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} min={min} max={max} inputMode={inputMode}
    style={{border:`1.5px solid ${C.border}`,borderRadius:12,padding:"11px 14px",fontSize:14,fontFamily:F,color:C.text,background:C.bgSoft,width:"100%",boxSizing:"border-box",outline:"none",...style}}/>;
}

function TextArea({value,onChange,placeholder}) {
  return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3}
    style={{border:`1.5px solid ${C.border}`,borderRadius:12,padding:"11px 14px",fontSize:13,fontFamily:F,color:C.text,background:C.bgSoft,width:"100%",boxSizing:"border-box",outline:"none",resize:"none",lineHeight:1.6}}/>;
}

function YesNo({value,onChange}) {
  const btn=(label,val,activeColor)=>(<button onClick={()=>onChange(val)} style={{flex:1,padding:"11px 0",borderRadius:12,border:`1.5px solid ${value===val?activeColor:C.border}`,background:value===val?activeColor:"transparent",color:value===val?"#fff":C.textSoft,fontFamily:F,fontSize:13,cursor:"pointer",fontWeight:value===val?600:400,transition:"all 0.2s"}}>{label}</button>);
  return <div style={{display:"flex",gap:8}}>{btn("Yes",true,C.blushDeep)}{btn("No",false,"#b0b8c8")}</div>;
}

function Slider({value,onChange,min=1,max=10}) {
  const num=parseInt(value)||0;
  const emoji=num<=3?"😔":num<=6?"😊":num<=8?"😄":"🤩";
  return (
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <input type="range" min={min} max={max} value={value||min} onChange={e=>onChange(e.target.value)} style={{flex:1}}/>
      <div style={{display:"flex",alignItems:"center",gap:6,minWidth:54}}>
        <span style={{fontSize:18}}>{value?emoji:""}</span>
        <span style={{fontFamily:F,fontSize:18,fontWeight:700,color:C.blushDeep,minWidth:20}}>{value||"–"}</span>
      </div>
    </div>
  );
}

function StatRow({label,value,unit="",accent}) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.borderSoft}`}}>
      <span style={{fontFamily:F,fontSize:13,color:C.textSoft}}>{label}</span>
      <span style={{fontFamily:F,fontSize:14,fontWeight:600,color:accent||C.text}}>{value!=null?value:"–"}{value!=null&&unit?" "+unit:""}</span>
    </div>
  );
}

function PillTag({children,color,bg}) {
  return <span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,background:bg||C.blushLight,color:color||C.blushDeep,fontFamily:F,fontSize:11,fontWeight:600,letterSpacing:"0.04em"}}>{children}</span>;
}

function StreakBadge({count,label,icon,color,bg}) {
  const active=count>0;
  return (
    <div style={{flex:1,background:active?(bg||C.blushLight):"#fafafa",border:`1.5px solid ${active?(color||C.blush):"#f0f0f0"}`,borderRadius:16,padding:"16px 10px",textAlign:"center",transition:"all 0.2s"}}>
      <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
      <div style={{fontFamily:F,fontSize:28,fontWeight:700,color:active?(color||C.blushDeep):"#d0d0d0"}}>{count}</div>
      <div style={{fontFamily:F,fontSize:10,color:active?(color||C.blushDeep):"#ccc",letterSpacing:"0.06em",textTransform:"uppercase",marginTop:3}}>{label}</div>
    </div>
  );
}

function MiniLineChart({data:points,color,height=65}) {
  const c=color||C.blushDeep;
  if(!points||points.length<2) return <p style={{fontFamily:F,fontSize:12,color:C.textLight,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>Not enough data yet</p>;
  const vals=points.map(p=>p.y);
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const W=280,H=height,pad=10;
  const xs=points.map((_,i)=>pad+(i/(points.length-1))*(W-pad*2));
  const ys=points.map(p=>H-pad-((p.y-min)/range)*(H-pad*2));
  const path=xs.map((x,i)=>`${i===0?"M":"L"} ${x} ${ys[i]}`).join(" ");
  const fill=path+` L ${xs[xs.length-1]} ${H} L ${xs[0]} ${H} Z`;
  const gId=`g${c.replace(/[^a-z0-9]/gi,"")}${Math.random().toString(36).substr(2,4)}`;
  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
        <defs><linearGradient id={gId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={c} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={c} stopOpacity="0"/>
        </linearGradient></defs>
        <path d={fill} fill={`url(#${gId})`}/>
        <path d={path} fill="none" stroke={c} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
        {points.map((p,i)=><circle key={i} cx={xs[i]} cy={ys[i]} r={4} fill="#fff" stroke={c} strokeWidth={2}/>)}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <span style={{fontFamily:F,fontSize:10,color:C.textLight}}>{points[0].label||points[0].x}</span>
        <span style={{fontFamily:F,fontSize:10,color:C.textLight}}>{points[points.length-1].label||points[points.length-1].x}</span>
      </div>
    </div>
  );
}

function BarChart({data:points,color,height=65}) {
  const c=color||C.blushDeep;
  if(!points||!points.some(p=>p.y>0)) return <p style={{fontFamily:F,fontSize:12,color:C.textLight,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>No data yet</p>;
  const max=Math.max(...points.map(p=>p.y),1);
  const W=280,H=height;
  const barW=(W/points.length)-6;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      {points.map((p,i)=>{
        const x=i*(W/points.length)+3;
        const barH=Math.max(p.y>0?4:0,(p.y/max)*(H-18));
        const active=p.y>0;
        return (
          <g key={i}>
            <rect x={x} y={H-barH-14} width={barW} height={barH} rx={4} fill={active?c:C.borderSoft}/>
            <text x={x+barW/2} y={H-2} textAnchor="middle" fill={C.textLight} fontSize={9} fontFamily={F}>{p.label||""}</text>
          </g>
        );
      })}
    </svg>
  );
}

function PhotoLogger({photos=[],onAdd,onRemove}) {
  const inputRef=useRef();
  function handleFile(e) { const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>onAdd({src:ev.target.result,ts:Date.now()});reader.readAsDataURL(file);e.target.value=""; }
  return (
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {photos.map((p,i)=>(
        <div key={i} style={{position:"relative"}}>
          <img src={p.src} alt="" style={{width:76,height:76,objectFit:"cover",borderRadius:14,border:`2px solid ${C.border}`}}/>
          <button onClick={()=>onRemove(i)} style={{position:"absolute",top:-6,right:-6,width:22,height:22,borderRadius:"50%",background:C.blushDeep,color:"#fff",border:"none",fontSize:12,cursor:"pointer"}}>×</button>
        </div>
      ))}
      <button onClick={()=>inputRef.current.click()} style={{width:76,height:76,borderRadius:14,border:`2px dashed ${C.blush}`,background:C.blushLight,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
        <span style={{fontSize:22}}>📷</span>
        <span style={{fontFamily:F,fontSize:10,color:C.blushDeep,fontWeight:600}}>Add</span>
      </button>
      <input ref={inputRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
    </div>
  );
}

// ── Home Tab ─────────────────────────────────────────────────────

function HomeTab({data,profile,setTab}) {
  const t=todayStr(),td=data[t]||emptyDay();
  const logStreak=calcLogStreak(data),gymStreak=calcGymStreak(data),waterStreak=calcWaterStreak(data);
  const cycleDay=calcCycleDay(t,profile.cycleStartDate),phase=cycleDay?getCyclePhase(cycleDay):null;
  const hour=new Date().getHours();
  const greeting=hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";
  const allEntries=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));
  const last7=allEntries.slice(-7);
  const moodPts=last7.filter(([,d])=>d.body?.mood).map(([date,d])=>({x:date,y:parseFloat(d.body.mood),label:date.slice(5)}));
  const sleepPts=last7.filter(([,d])=>d.sleep?.hrs).map(([date,d])=>({x:date,y:parseFloat(d.sleep.hrs),label:date.slice(5)}));
  const logged=!!data[t],showReminder=!logged&&hour>=19;
  const weightEntries=allEntries.filter(([,d])=>d.body?.weight);
  const latestWeight=weightEntries.length?parseWeight(weightEntries[weightEntries.length-1][1].body.weight):null;

  return (
    <div>
      {/* Hero greeting */}
      <div style={{background:`linear-gradient(135deg, ${C.blushLight} 0%, ${C.lavLight} 100%)`,borderRadius:24,padding:"24px 22px",marginBottom:14,border:`1px solid ${C.border}`}}>
        <p style={{fontFamily:FS,fontSize:28,color:C.text,margin:"0 0 2px",fontWeight:500}}>{greeting} 🌸</p>
        <p style={{fontFamily:F,fontSize:13,color:C.textSoft,margin:"0 0 18px"}}>{formatDateFull(t)}</p>

        {/* Quick stats grid */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {[
            {label:"Sleep",val:td.sleep?.hrs?`${td.sleep.hrs}h ${td.sleep.mins||0}m`:"–",icon:"🌙"},

// ── Log Tab ──────────────────────────────────────────────────────

function LogTab({data,setData,profile,setProfile,selectedDate,dayOffset,goDay}) {
  const d=data[selectedDate]||emptyDay();
  const cycleDay=calcCycleDay(selectedDate,profile.cycleStartDate);
  const phase=cycleDay?getCyclePhase(cycleDay):null;
  const weightVal=d.body?.weight||"";
  const bmi=weightVal&&profile.height?calcBMI(weightVal,profile.height):null;

  function update(section,key,val) {
    const prev=data[selectedDate]||emptyDay();
    setData({...data,[selectedDate]:{...prev,[section]:{...prev[section],[key]:val}}});
  }
  function updateTop(key,val) { const prev=data[selectedDate]||emptyDay();setData({...data,[selectedDate]:{...prev,[key]:val}}); }
  function updatePhoto(action,photoOrIdx) {
    const prev=data[selectedDate]||emptyDay(),photos=prev.photos||[];
    const next=action==="add"?[...photos,photoOrIdx]:photos.filter((_,i)=>i!==photoOrIdx);
    setData({...data,[selectedDate]:{...prev,photos:next}});
  }
  function markPeriodStart() {
    const newVal=!d.body?.periodStart;
    update("body","periodStart",newVal);
    if(newVal) {
      const np={...profile};
      if(profile.cycleStartDate&&profile.cycleStartDate!==selectedDate) {
        const len=daysBetween(selectedDate,profile.cycleStartDate);
        np.cycleHistory=[...(profile.cycleHistory||[]),{start:profile.cycleStartDate,length:len}].slice(-12);
      }
      np.cycleStartDate=selectedDate;
      setProfile(np);saveProfile(np);
    }
  }

  const sectionStyle={marginBottom:4};

  return (
    <div>
      {/* Date nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>goDay(-1)} style={{width:40,height:40,borderRadius:12,border:`1.5px solid ${C.border}`,background:"#fff",fontSize:18,cursor:"pointer",color:C.textSoft}}>‹</button>
        <div style={{background:dayOffset===0?C.blushDeep:"#fff",borderRadius:14,padding:"8px 20px",textAlign:"center",border:`1.5px solid ${dayOffset===0?C.blushDeep:C.border}`}}>
          <p style={{fontFamily:F,fontSize:14,fontWeight:700,color:dayOffset===0?"#fff":C.text,margin:0}}>{formatDateLabel(selectedDate)}</p>
          {dayOffset!==0&&<p style={{fontFamily:F,fontSize:11,color:C.textSoft,margin:"2px 0 0"}}>{selectedDate}</p>}
        </div>
        <button onClick={()=>goDay(1)} disabled={dayOffset>=0} style={{width:40,height:40,borderRadius:12,border:`1.5px solid ${C.border}`,background:"#fff",fontSize:18,cursor:dayOffset>=0?"default":"pointer",color:C.textSoft,opacity:dayOffset>=0?0.3:1}}>›</button>
      </div>

      {/* Cycle status pill */}
      {cycleDay&&phase&&(
        <div style={{display:"flex",alignItems:"center",gap:10,background:phase.bg,borderRadius:14,padding:"12px 16px",marginBottom:12,border:`1px solid ${phase.color}30`}}>
          <span style={{fontSize:22}}>{phase.emoji}</span>
          <div>
            <p style={{fontFamily:F,fontSize:12,fontWeight:700,color:phase.color,margin:0}}>Day {cycleDay} · {phase.name} Phase</p>
            <p style={{fontFamily:F,fontSize:11,color:C.textSoft,margin:0}}>Auto-calculated from your period start</p>
          </div>
        </div>
      )}

      {/* Morning */}
      <Card>
        <SectionTitle>🌅 Morning Note</SectionTitle>
        <TextArea value={d.morningNote||""} onChange={v=>updateTop("morningNote",v)} placeholder="How are you feeling this morning? What are you looking forward to today?"/>
      </Card>

      {/* Sleep */}
      <Card>
        <SectionTitle>🌙 Sleep</SectionTitle>
        <Label>Duration</Label>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <NumInput value={d.sleep.hrs} onChange={v=>update("sleep","hrs",v)} placeholder="hrs" max={24}/>
          <NumInput value={d.sleep.mins} onChange={v=>update("sleep","mins",v)} placeholder="mins" max={59}/>
        </div>
        <Label>Sleep Stages (%)</Label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["rem","REM %","#7055a8"],["deep","Deep %","#3d7fc0"],["light","Light %","#7cb8d8"],["awake","Awake %","#b8843a"]].map(([k,lbl,col])=>(
            <div key={k}>
              <p style={{fontFamily:F,fontSize:11,color:col,marginBottom:5,fontWeight:600}}>{lbl}</p>
              <NumInput value={d.sleep[k]} onChange={v=>update("sleep",k,v)} placeholder="0" max={100}/>
            </div>
          ))}
        </div>
      </Card>

      {/* Fitness */}
      <Card>
        <SectionTitle>🏃 Fitness</SectionTitle>
        <Label>Gym today?</Label>
        <div style={{marginBottom:16}}><YesNo value={d.fitness.gym} onChange={v=>update("fitness","gym",v)}/></div>
        <Label>Rest day?</Label>
        <div style={{marginBottom:16}}>
          <button onClick={()=>update("fitness","restDay",!d.fitness.restDay)}
            style={{padding:"11px 22px",borderRadius:12,border:`1.5px solid ${d.fitness.restDay?C.sage:C.border}`,background:d.fitness.restDay?C.sageLight:"transparent",color:d.fitness.restDay?"#5a9a5a":C.textSoft,fontFamily:F,fontSize:13,cursor:"pointer",fontWeight:600}}>
            {d.fitness.restDay?"✓ Rest Day 🌿":"Mark as Rest Day"}

        </div>
        <Label>Walk outside?</Label>
        <div style={{marginBottom:16}}><YesNo value={d.fitness.walk} onChange={v=>update("fitness","walk",v)}/></div>
        <Label>Sauna?</Label>
        <div style={{marginBottom:16}}><YesNo value={d.fitness.sauna} onChange={v=>update("fitness","sauna",v)}/></div>
        <Label>Daily Steps</Label>

        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <button onClick={()=>update("fitness","water",Math.max(0,(parseInt(d.fitness.water)||0)-1))}
            style={{width:40,height:40,borderRadius:12,border:`1.5px solid ${C.border}`,background:"#fff",fontSize:20,cursor:"pointer",color:C.textSoft}}>−</button>
          <div style={{textAlign:"center"}}>
            <span style={{fontFamily:F,fontSize:24,fontWeight:700,color:C.blushDeep}}>{d.fitness.water||0}</span>
            <p style={{fontFamily:F,fontSize:11,color:C.textLight,margin:0}}>{((parseInt(d.fitness.water)||0)*0.5).toFixed(1)}L</p>
          </div>
          <button onClick={()=>update("fitness","water",(parseInt(d.fitness.water)||0)+1)}
            style={{width:40,height:40,borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.blushLight,fontSize:20,cursor:"pointer",color:C.blushDeep}}>+</button>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",flex:1}}>
            {Array.from({length:parseInt(d.fitness.water)||0}).map((_,i)=><span key={i} style={{fontSize:16}}>💧</span>)}
          </div>
        </div>
      </Card>

      {/* Body */}
      <Card>
        <SectionTitle>✨ Body</SectionTitle>
        <Label>Period Start — Mark as Day 1</Label>
        <div style={{marginBottom:16}}>
          <button onClick={markPeriodStart}
            style={{padding:"11px 22px",borderRadius:12,border:`1.5px solid ${d.body.periodStart?"#b85c82":C.border}`,background:d.body.periodStart?C.blushLight:"transparent",color:d.body.periodStart?C.blushDeep:C.textSoft,fontFamily:F,fontSize:13,cursor:"pointer",fontWeight:600}}>
            {d.body.periodStart?"🌸 Period Started — Day 1":"Mark as Day 1"}
          </button>
        </div>
        {cycleDay&&<div style={{marginBottom:14}}><PillTag>📅 Cycle Day {cycleDay} — auto calculated</PillTag></div>}

        <Label>Mood (1–10)</Label>
        <div style={{marginBottom:16}}><Slider value={d.body.mood} onChange={v=>update("body","mood",v)}/></div>
        <Label>Energy (1–10)</Label>
        <Slider value={d.body.energy} onChange={v=>update("body","energy",v)}/>
      </Card>

      {/* Notes */}
      <Card>
        <SectionTitle>📝 Notes</SectionTitle>
        <TextArea value={d.notes||""} onChange={v=>updateTop("notes",v)} placeholder="PBs, symptoms, food, anything on your mind..."/>
      </Card>

      {/* Photos */}
      <Card>
        <SectionTitle>📷 Progress Photos</SectionTitle>
        <p style={{fontFamily:F,fontSize:12,color:C.textLight,marginBottom:14}}>Stored privately on your device only.</p>
        <PhotoLogger photos={d.photos||[]} onAdd={p=>updatePhoto("add",p)} onRemove={i=>updatePhoto("remove",i)}/>
      </Card>
    </div>
  );
}

  const deepPts=last7.filter(e=>e.deep).map(e=>({x:e.date,y:parseFloat(e.deep),label:e.date.slice(5)}));
  const awakePts=last7.filter(e=>e.awake).map(e=>({x:e.date,y:parseFloat(e.awake),label:e.date.slice(5)}));
  return (
    <div>
      <Card style={{background:`linear-gradient(135deg, #1a1035, #2d1f4a)`,border:"none"}}>

          <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>

      {deepPts.length>=2&&<Card><SectionTitle>Deep Sleep % — Last 7 Days</SectionTitle><MiniLineChart data={deepPts} color="#5b6af0" height={70}/></Card>}

// ── Fitness Tab ──────────────────────────────────────────────────

function FitnessTab({data}) {
  const [weekOffset,setWeekOffset]=useState(0);
  const weekDates=getWeekDates(weekOffset);
  const weekFitness=weekDates.map(d=>data[d]?.fitness||{});
  const gymDays=countYes(weekFitness,"gym");
  const restDays=weekFitness.filter(f=>f.restDay).length;
  const walks=countYes(weekFitness,"walk");
  const saunas=countYes(weekFitness,"sauna");
  const totalSteps=weekFitness.map(f=>parseFloat(f.steps||0)).filter(v=>!isNaN(v)).reduce((a,b)=>a+b,0);
  const avgSteps=weekFitness.filter(f=>f.steps).length?Math.round(totalSteps/weekFitness.filter(f=>f.steps).length):null;
  const totalWater=weekFitness.map(f=>parseFloat(f.water||0)).filter(v=>!isNaN(v)).reduce((a,b)=>a+b,0);
  const stepPts=weekDates.map((d,i)=>({x:d,y:parseFloat(data[d]?.fitness?.steps||0),label:["M","T","W","T","F","S","S"][i]}));
  const gymWeekly=[];
  for(let w=-7;w<=weekOffset;w++){const wd=getWeekDates(w);const gc=wd.filter(d=>data[d]?.fitness?.gym===true).length;const wl=new Date(wd[0]+"T00:00:00").toLocaleDateString("default",{month:"short",day:"numeric"});gymWeekly.push({x:wd[0],y:gc,label:wl.slice(0,5)});}
  const gymLast8=gymWeekly.slice(-8);
  const weekLabel=weekOffset===0?"This Week":weekOffset===-1?"Last Week":`${Math.abs(weekOffset)} weeks ago`;
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>setWeekOffset(weekOffset-1)} style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,padding:"8px 16px",cursor:"pointer",fontFamily:F,fontSize:13,color:C.textSoft}}>←</button>
        <span style={{fontFamily:FS,fontSize:20,color:C.text,fontWeight:500}}>{weekLabel}</span>
        <button onClick={()=>setWeekOffset(Math.min(0,weekOffset+1))} disabled={weekOffset>=0} style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,padding:"8px 16px",cursor:weekOffset>=0?"default":"pointer",fontFamily:F,fontSize:13,color:C.textSoft,opacity:weekOffset>=0?0.3:1}}>→</button>
      </div>

      {/* Summary pills */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {[
          {label:"Gym sessions",val:gymDays,icon:"🏋️",color:C.sage,bg:C.sageLight},
          {label:"Rest days",val:restDays,icon:"🌿",color:"#7055a8",bg:C.lavLight},
          {label:"Walks outside",val:walks,icon:"🚶",color:C.gold,bg:C.goldLight},
          {label:"Sauna",val:saunas,icon:"🧖",color:"#c07050",bg:"#fdf0eb"},
          {label:"Total water",val:`${(totalWater*0.5).toFixed(1)}L`,icon:"💧",color:"#5b9fd8",bg:"#edf5fb"},
        ].map(({label,val,icon,color,bg})=>(
          <div key={label} style={{background:bg||C.blushLight,borderRadius:16,padding:"14px 16px",border:`1px solid ${color}30`}}>
            <p style={{fontFamily:F,fontSize:10,color:color,margin:"0 0 4px",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600}}>{icon} {label}</p>
            <p style={{fontFamily:F,fontSize:22,fontWeight:700,color:C.text,margin:0}}>{val}</p>
          </div>
        ))}
      </div>

      {avgSteps&&(
        <Card style={{background:`linear-gradient(135deg, ${C.sageLight}, ${C.goldLight})`,border:`1px solid ${C.sage}`}}>
          <p style={{fontFamily:F,fontSize:11,color:"#6a9a6a",margin:"0 0 4px",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600}}>🏃 Avg Daily Steps</p>
          <p style={{fontFamily:FS,fontSize:32,color:C.text,margin:"0 0 2px",fontWeight:500}}>{avgSteps.toLocaleString()}</p>
          <p style={{fontFamily:F,fontSize:12,color:C.textSoft,margin:0}}>Total: {totalSteps.toLocaleString()} steps this week</p>
        </Card>
      )}

      <Card><SectionTitle>Daily Steps This Week</SectionTitle><BarChart data={stepPts} color={C.sage}/></Card>
      {gymLast8.length>=2&&<Card><SectionTitle>Gym Sessions — Last 8 Weeks</SectionTitle><BarChart data={gymLast8} color={C.blushDeep}/></Card>}
    </div>
  );
}

// ── Body Tab ─────────────────────────────────────────────────────

function BodyTab({data,profile,setProfile,weeklyBody,setWeeklyBody}) {
  const [showCheckIn,setShowCheckIn]=useState(false);
  const [checkInDate,setCheckInDate]=useState(todayStr());
  const allEntries=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));
  const withWeight=allEntries.filter(([,d])=>d.body?.weight);
  const latestWeight=withWeight.length?parseWeight(withWeight[withWeight.length-1][1].body.weight):null;
  const moodPts=allEntries.filter(([,d])=>d.body?.mood).map(([date,d])=>({x:date,y:parseFloat(d.body.mood),label:date.slice(5)}));
  const energyPts=allEntries.filter(([,d])=>d.body?.energy).map(([date,d])=>({x:date,y:parseFloat(d.body.energy),label:date.slice(5)}));
  const weightPts=withWeight.map(([date,d])=>({x:date,y:parseWeight(d.body.weight),label:date.slice(5)}));
  const wbEntries=Object.entries(weeklyBody).sort(([a],[b])=>a.localeCompare(b));
  const latestWB=wbEntries.length?wbEntries[wbEntries.length-1][1]:null;
  const bmi=latestWeight?calcBMI(latestWeight,profile.height):null;
  const wbWeightPts=wbEntries.filter(([,w])=>w.weight).map(([date,w])=>({x:date,y:parseFloat(w.weight),label:date.slice(5)}));
  const wbFatPts=wbEntries.filter(([,w])=>w.bodyFat).map(([date,w])=>({x:date,y:parseFloat(w.bodyFat),label:date.slice(5)}));
  const wbMusclePts=wbEntries.filter(([,w])=>w.muscleMass).map(([date,w])=>({x:date,y:parseFloat(w.muscleMass),label:date.slice(5)}));
  const wbWaterPts=wbEntries.filter(([,w])=>w.water).map(([date,w])=>({x:date,y:parseFloat(w.water),label:date.slice(5)}));

  function updateProfile(key,val){const np={...profile,[key]:val};setProfile(np);saveProfile(np);}
  function updateWB(key,val){
    const cleaned=String(val).replace(",",".");
    const current=weeklyBody[checkInDate]||emptyWeeklyBody();
    const next={...weeklyBody,[checkInDate]:{...current,[key]:cleaned}};
    setWeeklyBody(next);try{localStorage.setItem(STORAGE_KEY+"_wb",JSON.stringify(next));}catch{}
  }
  const currentWB=weeklyBody[checkInDate]||emptyWeeklyBody();

  const WB_FIELDS=[
    {key:"weight",label:"Weight",unit:"kg"},{key:"bmi",label:"BMI",unit:""},{key:"bodyFat",label:"Body Fat",unit:"%"},
    {key:"bodyFatMass",label:"Fat Mass",unit:"kg"},{key:"muscleMass",label:"Muscle Mass",unit:"kg"},{key:"skeletalMuscle",label:"Skeletal Muscle",unit:"kg"},
    {key:"leanBodyMass",label:"Lean Body Mass",unit:"kg"},{key:"water",label:"Water",unit:"%"},{key:"visceralFat",label:"Visceral Fat",unit:""},
    {key:"bmr",label:"BMR",unit:"kcal"},{key:"boneMass",label:"Bone Mass",unit:"kg"},{key:"protein",label:"Protein",unit:"%"},
    {key:"subcutaneousFat",label:"Subcutaneous Fat",unit:"%"},{key:"bodyAge",label:"Body Age",unit:""},{key:"bodyType",label:"Body Type",unit:""},
  ];

  return (
    <div>
      {/* Hero metrics */}
      <Card style={{background:`linear-gradient(135deg, ${C.blushLight}, ${C.lavLight})`,border:`1px solid ${C.border}`}}>
        <SectionTitle>Current Metrics ✨</SectionTitle>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {label:"Weight",val:latestWeight?`${formatWeight(latestWeight)} kg`:null,icon:"⚖️",color:C.blushDeep},
            {label:"BMI",val:bmi,icon:"📊",color:C.lavender},
            {label:"Body Fat",val:latestWB?.bodyFat?`${latestWB.bodyFat}%`:null,icon:"💧",color:"#5b9fd8"},
            {label:"Muscle Mass",val:latestWB?.muscleMass?`${latestWB.muscleMass} kg`:null,icon:"💪",color:"#4a8a4a"},
            {label:"Visceral Fat",val:latestWB?.visceralFat||null,icon:"🫀",color:C.gold},
            {label:"Body Age",val:latestWB?.bodyAge||null,icon:"🎂",color:"#7055a8"},
          ].map(({label,val,icon,color})=>(
            <div key={label} style={{background:"rgba(255,255,255,0.7)",borderRadius:14,padding:"12px"}}>
              <p style={{fontFamily:F,fontSize:10,color:C.textSoft,margin:"0 0 3px",letterSpacing:"0.06em",textTransform:"uppercase"}}>{icon} {label}</p>
              <p style={{fontFamily:F,fontSize:16,fontWeight:700,color:val?color:C.textLight,margin:0}}>{val||"–"}</p>
            </div>
          ))}
        </div>
        <div>
          <Label>Height (saved once)</Label>
          <input type="number" inputMode="numeric" value={profile.height||""} onChange={e=>updateProfile("height",e.target.value)} placeholder="165"
            style={{border:`1.5px solid ${C.border}`,borderRadius:12,padding:"10px 14px",fontSize:14,fontFamily:F,color:C.text,background:"rgba(255,255,255,0.8)",width:"100%",boxSizing:"border-box",outline:"none"}}/>
        </div>
      </Card>

      {weightPts.length>=2&&<Card><SectionTitle>Weight Trend</SectionTitle><MiniLineChart data={weightPts} color={C.blushDeep} height={70}/></Card>}
      {moodPts.length>=2&&<Card><SectionTitle>Mood Over Time 💫</SectionTitle><MiniLineChart data={moodPts} color={C.lavender} height={70}/></Card>}
      {energyPts.length>=2&&<Card><SectionTitle>Energy Over Time ⚡</SectionTitle><MiniLineChart data={energyPts} color={C.gold} height={70}/></Card>}

      {/* Weekly check-in */}
      <Card style={{border:`1.5px solid ${C.blush}`,background:C.blushLight}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div>
            <SectionTitle style={{margin:0}}>Weekly Body Check-In</SectionTitle>
            <p style={{fontFamily:F,fontSize:12,color:C.textSoft,margin:"4px 0 0"}}>Copy from Eufy Life · go back up to a year</p>
          </div>
          <button onClick={()=>setShowCheckIn(!showCheckIn)}
            style={{padding:"8px 16px",borderRadius:12,border:`1.5px solid ${C.blushDeep}`,background:showCheckIn?C.blushDeep:"transparent",color:showCheckIn?"#fff":C.blushDeep,fontFamily:F,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
            {showCheckIn?"Done ✓":"+ Add"}
          </button>
        </div>

        {wbEntries.length>0&&!showCheckIn&&(
          <p style={{fontFamily:F,fontSize:12,color:C.blushDeep,margin:"0 0 14px",fontWeight:600}}>
            {wbEntries.length} check-in{wbEntries.length!==1?"s":"s"} logged
          </p>
        )}

        {showCheckIn&&(
          <div>
            {/* Date navigator */}
            <p style={{fontFamily:F,fontSize:11,color:C.blushDeep,margin:"14px 0 8px",fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase"}}>Select Date</p>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <button onClick={()=>{const d=new Date(checkInDate+"T00:00:00");d.setDate(d.getDate()-7);setCheckInDate(d.toISOString().split("T")[0]);}}
                style={{width:38,height:38,borderRadius:10,border:`1.5px solid ${C.blush}`,background:"#fff",fontSize:16,cursor:"pointer",color:C.blushDeep,flexShrink:0}}>←</button>
              <div style={{flex:1,textAlign:"center",background:"#fff",borderRadius:10,padding:"9px 6px",border:`1px solid ${C.blush}`}}>
                <p style={{fontFamily:F,fontSize:13,fontWeight:700,color:C.text,margin:0}}>{new Date(checkInDate+"T00:00:00").toLocaleDateString("default",{weekday:"short",month:"short",day:"numeric",year:"numeric"})}</p>
                {weeklyBody[checkInDate]&&<p style={{fontFamily:F,fontSize:11,color:C.blushDeep,margin:"2px 0 0",fontWeight:600}}>✓ Saved</p>}
              </div>
              <button onClick={()=>{const d=new Date(checkInDate+"T00:00:00");d.setDate(d.getDate()+7);const next=d.toISOString().split("T")[0];if(next<=todayStr())setCheckInDate(next);}}
                style={{width:38,height:38,borderRadius:10,border:`1.5px solid ${C.blush}`,background:"#fff",fontSize:16,cursor:"pointer",color:C.blushDeep,flexShrink:0,opacity:checkInDate>=todayStr()?0.3:1}}>→</button>
            </div>
            <p style={{fontFamily:F,fontSize:11,color:C.textSoft,margin:"0 0 16px"}}>Use ← → to jump week by week</p>

            {/* Fields */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {WB_FIELDS.map(({key,label,unit})=>(
                <div key={key}>
                  <p style={{fontFamily:F,fontSize:11,color:C.textSoft,marginBottom:4,fontWeight:600}}>{label}{unit?` (${unit})`:""}</p>
                  <input type="text" inputMode="decimal" value={currentWB[key]||""} onChange={e=>updateWB(key,e.target.value)} placeholder="–"
                    style={{border:`1.5px solid ${currentWB[key]?C.blushDeep:C.blush}`,borderRadius:10,padding:"9px 12px",fontSize:13,fontFamily:F,color:C.text,background:"#fff",width:"100%",boxSizing:"border-box",outline:"none"}}/>
                </div>
              ))}
            </div>

            {/* Saved entries list */}
            {wbEntries.length>0&&(
              <div style={{marginTop:16}}>
                <p style={{fontFamily:F,fontSize:11,color:C.textLight,marginBottom:8,letterSpacing:"0.06em",textTransform:"uppercase"}}>All saved check-ins</p>
                <div style={{maxHeight:180,overflowY:"auto"}}>
                  {wbEntries.slice().reverse().map(([date,w])=>(
                    <div key={date} onClick={()=>setCheckInDate(date)}
                      style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",borderRadius:10,background:date===checkInDate?"#fff":"rgba(255,255,255,0.5)",border:`1px solid ${date===checkInDate?C.blushDeep:C.blush}`,marginBottom:6,cursor:"pointer"}}>
                      <span style={{fontFamily:F,fontSize:13,fontWeight:date===checkInDate?700:400,color:date===checkInDate?C.blushDeep:C.text}}>{date}</span>
                      <span style={{fontFamily:F,fontSize:12,color:C.textSoft}}>{w.weight?`${w.weight}kg`:""}{w.bodyFat?` · ${w.bodyFat}%`:""}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {latestWB&&!showCheckIn&&(
          <div>
            <p style={{fontFamily:F,fontSize:11,color:C.textLight,marginBottom:10}}>Latest: {wbEntries[wbEntries.length-1][0]}</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {WB_FIELDS.filter(f=>latestWB[f.key]).slice(0,8).map(({key,label,unit})=>(
                <div key={key} style={{background:C.bgSoft,borderRadius:10,padding:"10px 12px",border:`1px solid ${C.borderSoft}`}}>
                  <p style={{fontFamily:F,fontSize:10,color:C.textLight,margin:"0 0 3px",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</p>
                  <p style={{fontFamily:F,fontSize:15,fontWeight:700,color:C.text,margin:0}}>{latestWB[key]}{unit?" "+unit:""}</p>
                </div>
              ))}
            </div>
          </div>
        )}
        {!latestWB&&!showCheckIn&&(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <p style={{fontSize:32,margin:"0 0 8px"}}>⚖️</p>
            <p style={{fontFamily:F,fontSize:13,color:C.textLight,fontStyle:"italic"}}>Tap "+ Add" to start entering your Eufy data</p>
          </div>
        )}
      </Card>

      {wbWeightPts.length>=2&&<Card><SectionTitle>Weight — Check-In Trend</SectionTitle><MiniLineChart data={wbWeightPts} color={C.blushDeep} height={70}/></Card>}
      {wbFatPts.length>=2&&<Card><SectionTitle>Body Fat % Trend</SectionTitle><MiniLineChart data={wbFatPts} color="#e08070" height={70}/></Card>}
      {wbMusclePts.length>=2&&<Card><SectionTitle>Muscle Mass Trend 💪</SectionTitle><MiniLineChart data={wbMusclePts} color="#4a8a4a" height={70}/></Card>}
      {wbWaterPts.length>=2&&<Card><SectionTitle>Water % Trend 💧</SectionTitle><MiniLineChart data={wbWaterPts} color="#5b9fd8" height={70}/></Card>}
    </div>
  );
}

// ── Insights Tab ─────────────────────────────────────────────────

function InsightsTab({data,profile,weeklyBody}) {
  const insights=generateInsights(data);
  const allEntries=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));
  const notesEntries=allEntries.filter(([,d])=>d.notes||d.morningNote||d.eveningNote);
  const weekDates=getWeekDates(0);
  const weekFitness=weekDates.map(d=>data[d]?.fitness||{});
  const weekSleep=weekDates.map(d=>data[d]?.sleep||{}).filter(s=>s.hrs);
  const weekBody=weekDates.map(d=>data[d]?.body||{});

  return (
    <div>
      <Card style={{background:`linear-gradient(135deg, ${C.lavLight}, ${C.blushLight})`,border:`1px solid ${C.border}`}}>
        <SectionTitle>This Week 🌸</SectionTitle>
        {[["Days logged",weekDates.filter(d=>data[d]).length,"/ 7"],["Gym sessions",countYes(weekFitness,"gym"),""],["Avg sleep",avg(weekSleep,"hrs"),"hrs"],["Avg mood",avg(weekBody,"mood"),"/ 10"],["Avg energy",avg(weekBody,"energy"),"/ 10"],["Total steps",sumArr(weekFitness,"steps").toLocaleString(),""],["Total water",(sumArr(weekFitness,"water")*0.5).toFixed(1),"L"]].map(([label,value,unit])=>(
          <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid rgba(201,120,154,0.12)`}}>
            <span style={{fontFamily:F,fontSize:13,color:C.textSoft}}>{label}</span>
            <span style={{fontFamily:F,fontSize:14,fontWeight:700,color:C.text}}>{value!=null?value:"–"}{value!=null&&unit?" "+unit:""}</span>
          </div>
        ))}
      </Card>

      <Card>
        <SectionTitle>Personal Insights ✨</SectionTitle>
        {insights.length===0&&(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <p style={{fontSize:32,margin:"0 0 8px"}}>🌱</p>
            <p style={{fontFamily:F,fontSize:13,color:C.textLight,fontStyle:"italic"}}>Log at least 5 days to unlock your personal insights</p>
          </div>
        )}
        {insights.map((ins,i)=>(
          <div key={i} style={{display:"flex",gap:14,padding:"14px 0",borderBottom:`1px solid ${C.borderSoft}`}}>
            <span style={{fontSize:26}}>{ins.icon}</span>
            <p style={{fontFamily:F,fontSize:13,color:C.text,margin:0,lineHeight:1.7}}>{ins.text}</p>
          </div>
        ))}
      </Card>

      <Card>
        <SectionTitle>Export Your Data</SectionTitle>
        <p style={{fontFamily:F,fontSize:13,color:C.textSoft,marginBottom:14}}>Download everything as a CSV — great for sharing with your doctor or keeping a backup.</p>
        <button onClick={()=>exportCSV(data)} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:`linear-gradient(135deg, ${C.blushDeep}, #b06080)`,color:"#fff",fontFamily:F,fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(201,120,154,0.3)"}}>
          📥 Download CSV
        </button>
      </Card>

      {notesEntries.length>0&&(
        <Card>
          <SectionTitle>Your Journal 📖</SectionTitle>
          {notesEntries.slice().reverse().map(([date,d],i)=>(
            <div key={i} style={{padding:"14px 0",borderBottom:`1px solid ${C.borderSoft}`}}>
              <p style={{fontFamily:F,fontSize:10,letterSpacing:"0.08em",textTransform:"uppercase",color:C.textLight,margin:"0 0 8px"}}>{date}</p>
              {d.morningNote&&<p style={{fontFamily:F,fontSize:13,color:C.textSoft,margin:"0 0 5px",lineHeight:1.6}}>🌅 {d.morningNote}</p>}
              {d.eveningNote&&<p style={{fontFamily:F,fontSize:13,color:C.textSoft,margin:"0 0 5px",lineHeight:1.6}}>🌆 {d.eveningNote}</p>}
              {d.notes&&<p style={{fontFamily:F,fontSize:13,color:C.textSoft,margin:0,lineHeight:1.6}}>📝 {d.notes}</p>}
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────

function App() {
  const [data,setDataState]=useState({});
  const [profile,setProfile]=useState({height:"165",cycleStartDate:null,cycleHistory:[]});
  const [weeklyBody,setWeeklyBodyState]=useState({});
  const [tab,setTab]=useState(0);
  const [selectedDate,setSelectedDate]=useState(todayStr());
  const [dayOffset,setDayOffset]=useState(0);

  useEffect(()=>{
    setDataState(loadData());
    setProfile(loadProfile());
    try{const wb=localStorage.getItem(STORAGE_KEY+"_wb");if(wb)setWeeklyBodyState(JSON.parse(wb));}catch{}
  },[]);

  function setData(d){setDataState(d);saveData(d);}
  function setWeeklyBody(wb){setWeeklyBodyState(wb);try{localStorage.setItem(STORAGE_KEY+"_wb",JSON.stringify(wb));}catch{}}
  function goDay(delta){const n=dayOffset+delta;if(n>0)return;setDayOffset(n);setSelectedDate(offsetDate(n));}

  const allEntries=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:F}}>
      {/* Header */}
      <div style={{background:"rgba(253,246,240,0.95)",backdropFilter:"blur(10px)",borderBottom:`1px solid ${C.border}`,padding:"16px 20px 0",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <p style={{fontFamily:FS,fontSize:22,color:C.text,margin:0,fontWeight:500,letterSpacing:"0.01em"}}>My Health 🌸</p>
          <p style={{fontFamily:F,fontSize:10,color:C.textLight,margin:0,letterSpacing:"0.06em",textTransform:"uppercase"}}>private · local</p>
        </div>
        {/* Tab bar */}
        <div style={{display:"flex",gap:0,overflowX:"auto",marginLeft:-4}}>
          {TABS.map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)} style={{padding:"8px 12px",borderRadius:"12px 12px 0 0",border:"none",background:tab===i?"#fff":"transparent",color:tab===i?C.blushDeep:C.textLight,fontFamily:F,fontSize:11,fontWeight:tab===i?700:400,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,borderBottom:tab===i?`2px solid ${C.blushDeep}`:"2px solid transparent",transition:"all 0.2s"}}>
              <span style={{marginRight:4}}>{TAB_ICONS[i]}</span>{t}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{padding:"16px 16px 100px",maxWidth:500,margin:"0 auto"}}>
        {tab===0&&<HomeTab data={data} profile={profile} setTab={setTab}/>}
        {tab===1&&<LogTab data={data} setData={setData} profile={profile} setProfile={setProfile} selectedDate={selectedDate} dayOffset={dayOffset} goDay={goDay}/>}
        {tab===2&&<SleepTab entries={allEntries}/>}
        {tab===3&&<FitnessTab data={data}/>}
        {tab===4&&<BodyTab data={data} profile={profile} setProfile={setProfile} weeklyBody={weeklyBody} setWeeklyBody={setWeeklyBody}/>}
        {tab===5&&<InsightsTab data={data} profile={profile} weeklyBody={weeklyBody}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
