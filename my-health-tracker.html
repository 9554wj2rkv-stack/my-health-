<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="My Health"/>
  <title>My Health</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #fdf6f0; font-family: 'DM Sans', sans-serif; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #e0c0cc; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #b85c82; cursor: pointer; }
    input:focus, textarea:focus, button:focus { outline: none; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  bg:"#fdf6f0", bgCard:"#ffffff", bgSoft:"#fef9f5",
  blush:"#e8a8bc", blushDeep:"#b85c82", blushLight:"#fdeef3",
  lavender:"#9b84c0", lavLight:"#f0eaf7",
  sage:"#6a9a6a", sageLight:"#eef4ee",
  gold:"#b8843a", goldLight:"#fdf3e7",
  text:"#1e1018", textSoft:"#5a3a48", textLight:"#8a6070",
  border:"#e0c0cc", borderSoft:"#f2e4ea",
};

const CYCLE_PHASES = [
  { name:"Menstrual", days:[1,5], color:"#b85c82", bg:"#fdeef3", emoji:"🌸",
    exercise:"Gentle movement — yoga, stretching, short walks. Honor rest.",
    food:"Iron-rich foods: lentils, leafy greens, red meat. Warm nourishing meals.",
    supplements:"Iron, Magnesium, Vitamin C.",
    sleep:"Prioritize extra sleep. Your body is working hard." },
  { name:"Follicular", days:[6,13], color:"#4a8a4a", bg:"#eef4ee", emoji:"🌱",
    exercise:"Energy rising — great for strength training and cardio.",
    food:"Lighter foods: salads, lean proteins, fermented foods.",
    supplements:"B vitamins, Zinc, Probiotics.",
    sleep:"Sleep quality improves. Aim for 7-9 hrs." },
  { name:"Ovulation", days:[14,16], color:"#b8843a", bg:"#fdf3e7", emoji:"✨",
    exercise:"Peak energy — push yourself. HIIT, heavy lifts.",
    food:"Anti-inflammatory: berries, flaxseed, fiber-rich veg.",
    supplements:"Vitamin E, Antioxidants, Omega-3.",
    sleep:"May notice lighter sleep. Wind down well." },
  { name:"Luteal", days:[17,35], color:"#7055a8", bg:"#f3eef9", emoji:"🌙",
    exercise:"Slow down. Pilates, swimming, moderate walks.",
    food:"Complex carbs, magnesium-rich foods: dark chocolate, bananas.",
    supplements:"Magnesium, Vitamin B6, Evening Primrose Oil.",
    sleep:"Sleep may be disrupted. Limit screens and caffeine." },
];

const TABS = ["Home","Log","Sleep","Fitness","Body","Insights"];
const TAB_ICONS = ["🏠","📝","🌙","🏃","✨","💡"];
const SK = "my_health_james_v2";
const F = "'DM Sans', sans-serif";
const FS = "'Cormorant Garamond', serif";

function getPhase(day) {
  if (!day || day < 1) return null;
  for (const p of CYCLE_PHASES) if (day >= p.days[0] && day <= p.days[1]) return p;
  return CYCLE_PHASES[3];
}

const toDay = () => new Date().toISOString().split("T")[0];

function offDay(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.toISOString().split("T")[0];
}

function daysBetween(a, b) {
  return Math.round((new Date(a + "T00:00:00") - new Date(b + "T00:00:00")) / 86400000);
}

function cycleDay(sel, start) {
  if (!start) return null;
  const d = daysBetween(sel, start);
  return d < 0 ? null : d + 1;
}

function fmtLabel(s) {
  const t = toDay(), y = offDay(-1);
  if (s === t) return "Today";
  if (s === y) return "Yesterday";
  return new Date(s + "T00:00:00").toLocaleDateString("default", { weekday:"short", month:"short", day:"numeric" });
}

function fmtFull(s) {
  return new Date(s + "T00:00:00").toLocaleDateString("default", { weekday:"long", month:"long", day:"numeric" });
}

function parseW(v) {
  if (v === "" || v === null || v === undefined) return null;
  const n = parseFloat(String(v).replace(",", "."));
  return isNaN(n) ? null : n;
}

function fmtW(v) {
  const n = parseW(v);
  if (n === null) return null;
  return Number.isInteger(n) ? String(n) : n.toFixed(2).replace(/\.?0+$/, "");
}

function calcBMI(w, h) {
  const ww = parseW(w), hh = parseFloat(h);
  if (!ww || !hh) return null;
  return (ww / ((hh/100) * (hh/100))).toFixed(1);
}

function av(arr, key) {
  const v = arr.map(d => parseFloat(d[key])).filter(x => !isNaN(x));
  return v.length ? (v.reduce((a,b) => a+b,0) / v.length).toFixed(1) : null;
}

function sm(arr, key) {
  return arr.map(d => parseFloat(d[key])).filter(x => !isNaN(x)).reduce((a,b) => a+b, 0);
}

function cy(arr, key) { return arr.filter(d => d[key] === true).length; }

function weekDays(off = 0) {
  const now = new Date(), mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay()+6)%7) + off*7);
  const r = [];
  for (let i = 0; i < 7; i++) { const d = new Date(mon); d.setDate(mon.getDate()+i); r.push(d.toISOString().split("T")[0]); }
  return r;
}

function loadD() { try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : {}; } catch { return {}; } }
function saveD(d) { try { localStorage.setItem(SK, JSON.stringify(d)); } catch {} }
function loadP() { try { const r = localStorage.getItem(SK+"_p"); return r ? JSON.parse(r) : { height:"165", cycleStart:null, cycleHist:[] }; } catch { return { height:"165", cycleStart:null, cycleHist:[] }; } }
function saveP(p) { try { localStorage.setItem(SK+"_p", JSON.stringify(p)); } catch {} }
function loadWB() { try { const r = localStorage.getItem(SK+"_wb"); return r ? JSON.parse(r) : {}; } catch { return {}; } }
function saveWB(d) { try { localStorage.setItem(SK+"_wb", JSON.stringify(d)); } catch {} }
function loadMeas() { try { const r = localStorage.getItem(SK+"_meas"); return r ? JSON.parse(r) : {}; } catch { return {}; } }
function saveMeas(d) { try { localStorage.setItem(SK+"_meas", JSON.stringify(d)); } catch {} }

function migrate(data) {
  const OLD = ["my_health_tracker_v1","aj_health_tracker_v1","aj_health_tracker_v2"];
  try {
    if (Object.keys(data).length > 0) return;
    for (const k of OLD) {
      const r = localStorage.getItem(k);
      if (r) { const p = JSON.parse(r); if (Object.keys(p).length > 0) { localStorage.setItem(SK, r); return; } }
    }
  } catch {}
}

function emptyDay() {
  return { sleep:{ hrs:"",mins:"",rem:"",deep:"",light:"",awake:"" }, fitness:{ gym:null,steps:"",restDay:false,walk:null,sauna:null,water:"" }, body:{ mood:"",energy:"" }, notes:"", morningNote:"", photos:[] };
}

function emptyWB() {
  return { weight:"",bmi:"",bodyFat:"",bodyFatMass:"",muscleMass:"",skeletalMuscle:"",leanBodyMass:"",water:"",visceralFat:"",bmr:"",boneMass:"",protein:"",subcutaneousFat:"",bodyAge:"",bodyType:"" };
}

function logStreak(data) {
  let s=0; const d=new Date();
  for (let i=0;i<365;i++) { const k=d.toISOString().split("T")[0]; if(data[k]){s++;d.setDate(d.getDate()-1);}else break; }
  return s;
}

function gymStreak(data) {
  let s=0; const d=new Date();
  for (let i=0;i<365;i++) { const k=d.toISOString().split("T")[0]; const e=data[k]; if(!e){d.setDate(d.getDate()-1);if(i>0)break;continue;} if(e.fitness?.gym===true){s++;d.setDate(d.getDate()-1);}else break; }
  return s;
}

function waterStreak(data, t=4) {
  let s=0; const d=new Date();
  for (let i=0;i<365;i++) { const k=d.toISOString().split("T")[0]; const e=data[k]; if(e&&parseInt(e.fitness?.water||0)>=t){s++;d.setDate(d.getDate()-1);}else break; }
  return s;
}

function insights(data) {
  const ins=[], e=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));
  if (e.length<5) return [];
  const ws=e.filter(([,d])=>d.fitness?.walk===true&&d.sleep?.hrs).map(([,d])=>parseFloat(d.sleep.hrs)).filter(v=>!isNaN(v));
  const nws=e.filter(([,d])=>d.fitness?.walk===false&&d.sleep?.hrs).map(([,d])=>parseFloat(d.sleep.hrs)).filter(v=>!isNaN(v));
  if(ws.length>=3&&nws.length>=3){const wA=ws.reduce((a,b)=>a+b,0)/ws.length,nA=nws.reduce((a,b)=>a+b,0)/nws.length;if(wA-nA>0.3)ins.push({icon:"🚶",text:`You sleep ${(wA-nA).toFixed(1)} hrs more on days you walk outside.`});}
  const gm=e.filter(([,d])=>d.fitness?.gym===true&&d.body?.mood).map(([,d])=>parseFloat(d.body.mood)).filter(v=>!isNaN(v));
  const ngm=e.filter(([,d])=>d.fitness?.gym===false&&d.body?.mood).map(([,d])=>parseFloat(d.body.mood)).filter(v=>!isNaN(v));
  if(gm.length>=3&&ngm.length>=3){const gA=gm.reduce((a,b)=>a+b,0)/gm.length,nA=ngm.reduce((a,b)=>a+b,0)/ngm.length;if(gA-nA>0.5)ins.push({icon:"🏋️",text:`Your mood is ${(gA-nA).toFixed(1)} pts higher on gym days.`});}
  const sh=e.filter(([,d])=>d.sleep?.hrs).map(([,d])=>parseFloat(d.sleep.hrs)).filter(v=>!isNaN(v));
  if(sh.length>=7){const sA=(sh.reduce((a,b)=>a+b,0)/sh.length).toFixed(1);ins.push({icon:"😴",text:parseFloat(sA)<7?`Avg sleep is ${sA} hrs — aim for 7-9 hrs.`:`You average ${sA} hrs sleep. Great consistency.`});}
  const wd=e.filter(([,d])=>parseInt(d.fitness?.water||0)>=4).length;
  if(e.length>=5){const p=Math.round((wd/e.length)*100);ins.push({icon:"💧",text:p>=70?`Water goal hit ${p}% of days — excellent.`:`Water goal hit ${p}% of days. Keep a bottle visible.`});}
  return ins.slice(0,6);
}

function doCSV(data) {
  const rows=[["Date","Sleep Hrs","Sleep Mins","REM%","Deep%","Light%","Awake%","Gym","Steps","Rest","Walk","Sauna","Water","Mood","Energy","Morning Note","Notes"]];
  for(const [d,v] of Object.entries(data).sort(([a],[b])=>a.localeCompare(b)))
    rows.push([d,v.sleep?.hrs||"",v.sleep?.mins||"",v.sleep?.rem||"",v.sleep?.deep||"",v.sleep?.light||"",v.sleep?.awake||"",v.fitness?.gym===true?"Yes":v.fitness?.gym===false?"No":"",v.fitness?.steps||"",v.fitness?.restDay?"Yes":"No",v.fitness?.walk===true?"Yes":v.fitness?.walk===false?"No":"",v.fitness?.sauna===true?"Yes":v.fitness?.sauna===false?"No":"",v.fitness?.water||"",v.body?.mood||"",v.body?.energy||"",`"${(v.morningNote||"").replace(/"/g,'""')}"`,`"${(v.notes||"").replace(/"/g,'""')}"`]);
  const csv=rows.map(r=>r.join(",")).join("\n"),blob=new Blob([csv],{type:"text/csv"}),url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download="my-health.csv";a.click();URL.revokeObjectURL(url);
}

// ── Primitives ───────────────────────────────────────────────────

function Card({children,style={}}) {
  return <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:20,padding:"20px 22px",marginBottom:12,boxShadow:"0 2px 12px rgba(184,92,130,0.06)",...style}}>{children}</div>;
}

function Title({children,color}) {
  return <p style={{fontFamily:FS,fontSize:22,color:color||C.text,marginBottom:14,marginTop:2,fontWeight:500}}>{children}</p>;
}

function Lbl({children}) {
  return <p style={{fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:C.textLight,marginBottom:7,fontFamily:F,fontWeight:600}}>{children}</p>;
}

function Row({label,value,unit=""}) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.borderSoft}`}}>
      <span style={{fontFamily:F,fontSize:13,color:C.textSoft}}>{label}</span>
      <span style={{fontFamily:F,fontSize:14,fontWeight:600,color:C.text}}>{value!=null?value:"–"}{value!=null&&unit?" "+unit:""}</span>
    </div>
  );
}

function YN({value,onChange}) {
  const btn=(lbl,val)=>(
    <button onClick={()=>onChange(val)} style={{flex:1,padding:"11px 0",borderRadius:12,border:`1.5px solid ${value===val?C.blushDeep:C.border}`,background:value===val?C.blushDeep:"transparent",color:value===val?"#fff":C.textSoft,fontFamily:F,fontSize:13,cursor:"pointer",fontWeight:value===val?600:400}}>{lbl}</button>
  );
  return <div style={{display:"flex",gap:8}}>{btn("Yes",true)}{btn("No",false)}</div>;
}

function Slide({value,onChange}) {
  const n=parseInt(value)||0;
  const em=n<=3?"😔":n<=6?"😊":n<=8?"😄":"🤩";
  return (
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <input type="range" min={1} max={10} value={value||1} onChange={e=>onChange(e.target.value)} style={{flex:1}}/>
      <div style={{display:"flex",alignItems:"center",gap:5,minWidth:46}}>
        {value?<span style={{fontSize:16}}>{em}</span>:null}
        <span style={{fontFamily:F,fontSize:18,fontWeight:700,color:C.blushDeep}}>{value||"–"}</span>
      </div>
    </div>
  );
}

function Streak({count,label,icon,color,bg}) {
  const on=count>0;
  return (
    <div style={{flex:1,background:on?(bg||C.blushLight):"#fafafa",border:`1.5px solid ${on?(color||C.blush):"#f0f0f0"}`,borderRadius:16,padding:"16px 10px",textAlign:"center"}}>
      <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
      <div style={{fontFamily:F,fontSize:28,fontWeight:700,color:on?(color||C.blushDeep):"#ccc"}}>{count}</div>
      <div style={{fontFamily:F,fontSize:10,color:on?(color||C.blushDeep):"#ccc",letterSpacing:"0.06em",textTransform:"uppercase",marginTop:3}}>{label}</div>
    </div>
  );
}

function Line({pts,color,h=65}) {
  const c=color||C.blushDeep;
  if(!pts||pts.length<2) return <p style={{fontFamily:F,fontSize:12,color:C.textLight,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>Not enough data yet</p>;
  const vals=pts.map(p=>p.y),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=280,H=h,pd=10;
  const xs=pts.map((_,i)=>pd+(i/(pts.length-1))*(W-pd*2));
  const ys=pts.map(p=>H-pd-((p.y-mn)/rng)*(H-pd*2));
  const path=xs.map((x,i)=>`${i===0?"M":"L"} ${x} ${ys[i]}`).join(" ");
  const fill=path+` L ${xs[xs.length-1]} ${H} L ${xs[0]} ${H} Z`;
  const id=`g${c.replace(/[^a-z0-9]/gi,"")}${Math.random().toString(36).substr(2,4)}`;
  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
        <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity="0.2"/><stop offset="100%" stopColor={c} stopOpacity="0"/></linearGradient></defs>
        <path d={fill} fill={`url(#${id})`}/>
        <path d={path} fill="none" stroke={c} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=><circle key={i} cx={xs[i]} cy={ys[i]} r={3.5} fill="#fff" stroke={c} strokeWidth={2}/>)}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <span style={{fontFamily:F,fontSize:10,color:C.textLight}}>{pts[0].label||pts[0].x}</span>
        <span style={{fontFamily:F,fontSize:10,color:C.textLight}}>{pts[pts.length-1].label||pts[pts.length-1].x}</span>
      </div>
    </div>
  );
}

function MultiLine({series,h=80}) {
  const all=series.flatMap(s=>s.pts);
  if(all.length<2) return <p style={{fontFamily:F,fontSize:12,color:C.textLight,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>Not enough data yet</p>;
  const vals=all.map(p=>p.y),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=280,H=h,pd=10;
  const allX=[...new Set(all.map(p=>p.x))].sort();
  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
        {series.map((s,si)=>{
          if(s.pts.length<2) return null;
          const xs=s.pts.map(p=>pd+(allX.indexOf(p.x)/(allX.length-1||1))*(W-pd*2));
          const ys=s.pts.map(p=>H-pd-((p.y-mn)/rng)*(H-pd*2));
          const path=xs.map((x,i)=>`${i===0?"M":"L"} ${x} ${ys[i]}`).join(" ");
          return <path key={si} d={path} fill="none" stroke={s.color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>;
        })}
        {series.map((s,si)=>s.pts.map((p,i)=>{
          const x=pd+(allX.indexOf(p.x)/(allX.length-1||1))*(W-pd*2);
          const y=H-pd-((p.y-mn)/rng)*(H-pd*2);
          return <circle key={`${si}-${i}`} cx={x} cy={y} r={3} fill="#fff" stroke={s.color} strokeWidth={2}/>;
        }))}
      </svg>
      <div style={{display:"flex",gap:14,marginTop:8,flexWrap:"wrap"}}>
        {series.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:12,height:3,borderRadius:2,background:s.color}}/>
            <span style={{fontFamily:F,fontSize:11,color:C.textSoft}}>{s.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Bars({pts,color,h=65}) {
  const c=color||C.blushDeep;
  if(!pts||!pts.some(p=>p.y>0)) return <p style={{fontFamily:F,fontSize:12,color:C.textLight,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>No data yet</p>;
  const mx=Math.max(...pts.map(p=>p.y),1),W=280,H=h,bw=(W/pts.length)-5;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      {pts.map((p,i)=>{
        const x=i*(W/pts.length)+2.5,bh=Math.max(p.y>0?4:0,(p.y/mx)*(H-16));
        return (
          <g key={i}>
            <rect x={x} y={H-bh-14} width={bw} height={bh} rx={4} fill={p.y>0?c:C.borderSoft}/>
            <text x={x+bw/2} y={H-1} textAnchor="middle" fill={C.textLight} fontSize={9} fontFamily={F}>{p.label||""}</text>
          </g>
        );
      })}
    </svg>
  );
}

function Photos({photos,onAdd,onRemove}) {
  const ref=useRef();
  function handle(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onAdd({src:ev.target.result,ts:Date.now()});r.readAsDataURL(f);e.target.value="";}
  return (
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {(photos||[]).map((p,i)=>(
        <div key={i} style={{position:"relative"}}>
          <img src={p.src} alt="" style={{width:76,height:76,objectFit:"cover",borderRadius:14,border:`2px solid ${C.border}`}}/>
          <button onClick={()=>onRemove(i)} style={{position:"absolute",top:-6,right:-6,width:22,height:22,borderRadius:"50%",background:C.blushDeep,color:"#fff",border:"none",fontSize:12,cursor:"pointer"}}>x</button>
        </div>
      ))}
      <button onClick={()=>ref.current.click()} style={{width:76,height:76,borderRadius:14,border:`2px dashed ${C.blush}`,background:C.blushLight,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
        <span style={{fontSize:22}}>+</span>
        <span style={{fontFamily:F,fontSize:10,color:C.blushDeep,fontWeight:600}}>Photo</span>
      </button>
      <input ref={ref} type="file" accept="image/*" onChange={handle} style={{display:"none"}}/>
    </div>
  );
}

function WBField({label,unit,value,onChange}) {
  return (
    <div>
      <p style={{fontFamily:F,fontSize:11,color:C.textSoft,marginBottom:4,fontWeight:600}}>{label}{unit?" ("+unit+")":""}</p>
      <input type="text" inputMode="decimal" value={value||""} onChange={e=>onChange(e.target.value)} placeholder="-"
        style={{border:`1.5px solid ${value?C.blushDeep:C.blush}`,borderRadius:10,padding:"9px 12px",fontSize:13,fontFamily:F,color:C.text,background:"#fff",width:"100%",boxSizing:"border-box",outline:"none"}}/>
    </div>
  );
}

// ── Home ─────────────────────────────────────────────────────────

function Home({data,profile,setTab}) {
  const t=toDay(), td=data[t]||emptyDay();
  const ls=logStreak(data), gs=gymStreak(data), ws=waterStreak(data);
  const cd=cycleDay(t,profile.cycleStart), ph=cd?getPhase(cd):null;
  const hr=new Date().getHours();
  const gr=hr<12?"Good morning":hr<17?"Good afternoon":"Good evening";
  const ents=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));
  const l7=ents.slice(-7);
  const moodPts=l7.filter(([,d])=>d.body?.mood).map(([dt,d])=>({x:dt,y:parseFloat(d.body.mood),label:dt.slice(5)}));

  const wbe=Object.entries(loadWB()).sort(([a],[b])=>a.localeCompare(b));

        {(latW||cd)&&(

              <p style={{fontFamily:F,fontSize:12,color:"rgba(255,255,255,0.7)",margin:"4px 0 0"}}>Just a few minutes.</p>

// ── Log ──────────────────────────────────────────────────────────

    setData({...data,[sel]:{...p,[sec]:{...p[sec],[key]:val}}});

        </div>
        <button onClick={()=>goDay(1)} disabled={off>=0} style={{width:40,height:40,borderRadius:12,border:`1.5px solid ${C.border}`,background:"#fff",fontSize:18,cursor:off>=0?"default":"pointer",color:C.textSoft,opacity:off>=0?0.3:1}}>&#8250;</button>

        <div style={{display:"flex",alignItems:"center",gap:10,background:ph.bg,borderRadius:14,padding:"12px 16px",marginBottom:12,border:`1px solid ${ph.color}30`}}>

          <div>
            <p style={{fontFamily:F,fontSize:12,fontWeight:700,color:ph.color,margin:0}}>Day {cd} - {ph.name} Phase</p>

        <Title>Morning Note 🌅</Title>

        <Slide value={d.body.energy} onChange={v=>upd("body","energy",v)}/>

      <Card>
        <Title>Notes 📝</Title>

// ── Sleep ────────────────────────────────────────────────────────

function Sleep({entries}) {
  const se=entries.map(([dt,d])=>({dt,...d.sleep})).filter(e=>e.hrs);
  const l7=se.slice(-7);
  const durP=l7.map(e=>({x:e.dt,y:parseFloat(e.hrs),label:e.dt.slice(5)}));
  const remP=l7.filter(e=>e.rem).map(e=>({x:e.dt,y:parseFloat(e.rem),label:e.dt.slice(5)}));
  const depP=l7.filter(e=>e.deep).map(e=>({x:e.dt,y:parseFloat(e.deep),label:e.dt.slice(5)}));
  const awP=l7.filter(e=>e.awake).map(e=>({x:e.dt,y:parseFloat(e.awake),label:e.dt.slice(5)}));
  return (
    <div>
      <Card style={{background:"linear-gradient(135deg,#1a1035,#2d1f4a)",border:"none"}}>
        <Title color="#e8d5f5">Sleep Overview 🌙</Title>
        {[["Avg duration",av(se,"hrs"),"hrs","#c8b4d8"],["Avg REM",av(se,"rem"),"%","#9b84c0"],["Avg Deep",av(se,"deep"),"%","#7055a8"],["Avg Light",av(se,"light"),"%","#b4c8d8"],["Avg Awake",av(se,"awake"),"%","#b8843a"],["Days logged",se.length,"","#f2c4d0"]].map(([l,v,u,col])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
            <span style={{fontFamily:F,fontSize:13,color:"rgba(255,255,255,0.6)"}}>{l}</span>
            <span style={{fontFamily:F,fontSize:14,fontWeight:700,color:col}}>{v!=null?v:"–"}{v!=null&&u?" "+u:""}</span>
          </div>
        ))}
      </Card>
      <Card><Title>Duration - Last 7 Days</Title><Line pts={durP} color={C.blushDeep} h={80}/></Card>
      {remP.length>=2&&<Card><Title>REM % - Last 7 Days</Title><Line pts={remP} color="#9b84c0" h={70}/></Card>}
      {depP.length>=2&&<Card><Title>Deep Sleep % - Last 7 Days</Title><Line pts={depP} color="#5b6af0" h={70}/></Card>}
      {awP.length>=2&&<Card><Title>Awake % - Last 7 Days</Title><Line pts={awP} color={C.gold} h={70}/></Card>}
      {!se.length&&<div style={{textAlign:"center",padding:"60px 20px"}}><p style={{fontSize:40}}>🌙</p><p style={{fontFamily:F,color:C.textLight,fontStyle:"italic"}}>No sleep data yet</p></div>}
    </div>
  );
}

// ── Fitness ──────────────────────────────────────────────────────

function Fitness({data}) {
  const [wOff,setWOff]=useState(0);
  const wd=weekDays(wOff), wf=wd.map(d=>data[d]?.fitness||{});
  const gd=cy(wf,"gym"), rd=wf.filter(f=>f.restDay).length, wks=cy(wf,"walk"), sns=cy(wf,"sauna");
  const ts=wf.map(f=>parseFloat(f.steps||0)).filter(v=>!isNaN(v)).reduce((a,b)=>a+b,0);
  const as=wf.filter(f=>f.steps).length?Math.round(ts/wf.filter(f=>f.steps).length):null;
  const tw=wf.map(f=>parseFloat(f.water||0)).filter(v=>!isNaN(v)).reduce((a,b)=>a+b,0);
  const sP=wd.map((d,i)=>({x:d,y:parseFloat(data[d]?.fitness?.steps||0),label:["M","T","W","T","F","S","S"][i]}));
  const gW=[];
  for(let w=-7;w<=wOff;w++){const wd2=weekDays(w);const gc=wd2.filter(d=>data[d]?.fitness?.gym===true).length;const wl=new Date(wd2[0]+"T00:00:00").toLocaleDateString("default",{month:"short",day:"numeric"});gW.push({x:wd2[0],y:gc,label:wl.slice(0,5)});}
  const wl=wOff===0?"This Week":wOff===-1?"Last Week":`${Math.abs(wOff)} weeks ago`;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>setWOff(wOff-1)} style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,padding:"8px 16px",cursor:"pointer",fontFamily:F,fontSize:13,color:C.textSoft}}>←</button>
        <span style={{fontFamily:FS,fontSize:20,color:C.text,fontWeight:500}}>{wl}</span>
        <button onClick={()=>setWOff(Math.min(0,wOff+1))} disabled={wOff>=0} style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,padding:"8px 16px",cursor:wOff>=0?"default":"pointer",fontFamily:F,fontSize:13,color:C.textSoft,opacity:wOff>=0?0.3:1}}>→</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {[{l:"Gym",v:gd,i:"🏋️",c:C.sage,bg:C.sageLight},{l:"Rest days",v:rd,i:"🌿",c:"#7055a8",bg:C.lavLight},{l:"Walks",v:wks,i:"🚶",c:C.gold,bg:C.goldLight},{l:"Sauna",v:sns,i:"🧖",c:"#c07050",bg:"#fdf0eb"},{l:"Total water",v:`${(tw*0.5).toFixed(1)}L`,i:"💧",c:"#5b9fd8",bg:"#edf5fb"}].map(({l,v,i,c,bg})=>(
          <div key={l} style={{background:bg,borderRadius:16,padding:"14px 16px",border:`1px solid ${c}30`}}>
            <p style={{fontFamily:F,fontSize:10,color:c,margin:"0 0 4px",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600}}>{i} {l}</p>
            <p style={{fontFamily:F,fontSize:22,fontWeight:700,color:C.text,margin:0}}>{v}</p>
          </div>
        ))}
      </div>
      {as&&<Card style={{background:`linear-gradient(135deg,${C.sageLight},${C.goldLight})`,border:`1px solid ${C.sage}`}}>
        <p style={{fontFamily:F,fontSize:11,color:"#6a9a6a",margin:"0 0 4px",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600}}>🏃 Avg Daily Steps</p>
        <p style={{fontFamily:FS,fontSize:32,color:C.text,margin:"0 0 2px",fontWeight:500}}>{as.toLocaleString()}</p>
        <p style={{fontFamily:F,fontSize:12,color:C.textSoft,margin:0}}>Total: {ts.toLocaleString()} steps</p>
      </Card>}
      <Card><Title>Steps This Week</Title><Bars pts={sP} color={C.sage}/></Card>
      {gW.length>=2&&<Card><Title>Gym Sessions - Last 8 Weeks</Title><Bars pts={gW.slice(-8)} color={C.blushDeep}/></Card>}
    </div>
  );
}

// ── Body ─────────────────────────────────────────────────────────

function Body({data,setData,profile,setProfile}) {
  const [showCI,setShowCI]=useState(false);
  const [showAdv,setShowAdv]=useState(false);
  const [showMeas,setShowMeas]=useState(false);
  const [ciDate,setCIDate]=useState(toDay());
  const [wbData,setWBData]=useState(()=>loadWB());
  const [measData,setMeasData]=useState(()=>loadMeas());
  const [measDate,setMeasDate]=useState(toDay());

  const ents=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));
  const withW=ents.filter(([,d])=>d.body?.weight);
  const latW=withW.length?parseW(withW[withW.length-1][1].body?.weight):null;
  const moodP=ents.filter(([,d])=>d.body?.mood).map(([dt,d])=>({x:dt,y:parseFloat(d.body.mood),label:dt.slice(5)}));
  const enP=ents.filter(([,d])=>d.body?.energy).map(([dt,d])=>({x:dt,y:parseFloat(d.body.energy),label:dt.slice(5)}));
  const wbE=Object.entries(wbData).sort(([a],[b])=>a.localeCompare(b));
  const latWB=wbE.length?wbE[wbE.length-1][1]:null;
  const bmi=latW?calcBMI(latW,profile.height):null;
  const l12=wbE.slice(-12);
  const wP=l12.filter(([,w])=>w.weight).map(([dt,w])=>({x:dt,y:parseFloat(w.weight),label:dt.slice(5)}));

  const mP=l12.filter(([,w])=>w.muscleMass).map(([dt,w])=>({x:dt,y:parseFloat(w.muscleMass),label:dt.slice(5)}));
  const waP=l12.filter(([,w])=>w.water).map(([dt,w])=>({x:dt,y:parseFloat(w.water),label:dt.slice(5)}));
  const curWB=wbData[ciDate]||emptyWB();

  const latMeas=measE.length?measE[measE.length-1][1]:null;

  function updWB(key,val){
    const c=String(val).replace(",",".");

    setWBData(next); saveWB(next);

  function updMeas(key,val){

  function updProfile(key,val){const np={...profile,[key]:val};setProfile(np);saveP(np);}

  const allPhotos=Object.values(data).flatMap(d=>d.photos||[]);

  function addPhoto(p){
    const t=toDay(), prev=data[t]||emptyDay();
    setData({...data,[t]:{...prev,photos:[...(prev.photos||[]),p]}});
  }
  function removePhoto(i){
    const removed=allPhotos[i];
    const nd={};
    for(const [dt,d] of Object.entries(data)){
      nd[dt]={...d,photos:(d.photos||[]).filter(p=>p.ts!==removed?.ts)};
    }
    setData(nd);
  }

  const CORE=[{k:"weight",l:"Weight",u:"kg"},{k:"bodyFat",l:"Body Fat",u:"%"},{k:"muscleMass",l:"Muscle Mass",u:"kg"},{k:"skeletalMuscle",l:"Skeletal Muscle",u:"kg"},{k:"waist",l:"Waist",u:"cm"},{k:"hips",l:"Hips",u:"cm"},{k:"water",l:"Water",u:"%"},{k:"visceralFat",l:"Visceral Fat",u:""},{k:"bmr",l:"BMR",u:"kcal"},{k:"bmi",l:"BMI",u:""}];
  const ADV=[{k:"protein",l:"Protein",u:"%"},{k:"boneMass",l:"Bone Mass",u:"kg"},{k:"subcutaneousFat",l:"Subcut Fat",u:"%"},{k:"bodyType",l:"Body Type",u:""},{k:"bodyAge",l:"Body Age",u:""},{k:"bodyFatMass",l:"Fat Mass",u:"kg"},{k:"leanBodyMass",l:"Lean Body Mass",u:"kg"}];
  const MEAS=[{k:"waist",l:"Waist",u:"cm"},{k:"hips",l:"Hips",u:"cm"},{k:"chest",l:"Chest",u:"cm"},{k:"leftThigh",l:"Left Thigh",u:"cm"},{k:"rightThigh",l:"Right Thigh",u:"cm"},{k:"leftArm",l:"Left Arm",u:"cm"},{k:"rightArm",l:"Right Arm",u:"cm"}];

  return (
    <div>
      <Card style={{background:`linear-gradient(135deg,${C.blushLight},${C.lavLight})`,border:`1px solid ${C.border}`}}>
        <Title>Core Metrics ✨</Title>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[{l:"Weight",v:latW?`${fmtW(latW)} kg`:null,i:"⚖️",c:C.blushDeep},{l:"BMI",v:bmi,i:"📊",c:C.lavender},{l:"Body Fat",v:latWB?.bodyFat?`${latWB.bodyFat}%`:null,i:"🔥",c:"#d06050"},{l:"Muscle Mass",v:latWB?.muscleMass?`${latWB.muscleMass} kg`:null,i:"💪",c:"#4a8a4a"},{l:"Skeletal Muscle",v:latWB?.skeletalMuscle?`${latWB.skeletalMuscle} kg`:null,i:"🦴",c:"#7055a8"},{l:"Waist",v:latWB?.waist?`${latWB.waist} cm`:latMeas?.waist?`${latMeas.waist} cm`:null,i:"📏",c:C.gold},{l:"Hips",v:latWB?.hips?`${latWB.hips} cm`:latMeas?.hips?`${latMeas.hips} cm`:null,i:"📐",c:C.gold},{l:"Water %",v:latWB?.water?`${latWB.water}%`:null,i:"💧",c:"#5b9fd8"},{l:"Visceral Fat",v:latWB?.visceralFat||null,i:"🫀",c:"#c05050"},{l:"BMR",v:latWB?.bmr?`${latWB.bmr} kcal`:null,i:"⚡",c:C.gold}].map(({l,v,i,c})=>(
            <div key={l} style={{background:"rgba(255,255,255,0.75)",borderRadius:12,padding:"10px 12px"}}>
              <p style={{fontFamily:F,fontSize:10,color:C.textSoft,margin:"0 0 3px",letterSpacing:"0.06em",textTransform:"uppercase"}}>{i} {l}</p>
              <p style={{fontFamily:F,fontSize:15,fontWeight:700,color:v?c:C.textLight,margin:0}}>{v||"–"}</p>
            </div>
          ))}
        </div>
        <Lbl>Height (saved once)</Lbl>
        <input type="number" inputMode="numeric" value={profile.height||""} onChange={e=>updProfile("height",e.target.value)} placeholder="165"
          style={{border:`1.5px solid ${C.border}`,borderRadius:12,padding:"10px 14px",fontSize:14,fontFamily:F,color:C.text,background:"rgba(255,255,255,0.8)",width:"100%",boxSizing:"border-box",outline:"none"}}/>
      </Card>

      {wP.length>=2&&<Card><Title>Weight - Last 12 Weeks</Title><Line pts={wP} color={C.blushDeep} h={80}/></Card>}

      {(fP.length>=2||mP.length>=2)&&(
        <Card>
          <Title>Body Composition Trend</Title>
          <p style={{fontFamily:F,fontSize:12,color:C.textSoft,margin:"-8px 0 12px"}}>Am I losing fat or muscle?</p>
          <MultiLine series={[{pts:fP,color:"#d06050",label:"Body Fat %"},{pts:mP,color:"#4a8a4a",label:"Muscle kg"},{pts:waP,color:"#5b9fd8",label:"Water %"}].filter(s=>s.pts.length>=2)} h={90}/>
        </Card>
      )}

      {moodP.length>=2&&<Card><Title>Mood Over Time 💫</Title><Line pts={moodP} color={C.lavender} h={70}/></Card>}
      {enP.length>=2&&<Card><Title>Energy Over Time ⚡</Title><Line pts={enP} color={C.gold} h={70}/></Card>}

      <Card style={{border:`1.5px solid ${C.blush}`,background:C.blushLight}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div>
            <Title style={{margin:0}}>Weekly Body Check-In</Title>

          </div>
          <button onClick={()=>setShowCI(!showCI)} style={{padding:"8px 16px",borderRadius:12,border:`1.5px solid ${C.blushDeep}`,background:showCI?C.blushDeep:"transparent",color:showCI?"#fff":C.blushDeep,fontFamily:F,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
            {showCI?"Done":"+ Add"}
          </button>
        </div>
        {wbE.length>0&&!showCI&&<p style={{fontFamily:F,fontSize:12,color:C.blushDeep,margin:"0 0 14px",fontWeight:600}}>{wbE.length} check-ins logged</p>}
        {showCI&&(
          <div>
            <p style={{fontFamily:F,fontSize:11,color:C.blushDeep,margin:"14px 0 8px",fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase"}}>Select Date</p>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
              <button onClick={()=>{const d=new Date(ciDate+"T00:00:00");d.setDate(d.getDate()-7);setCIDate(d.toISOString().split("T")[0]);}} style={{width:38,height:38,borderRadius:10,border:`1.5px solid ${C.blush}`,background:"#fff",fontSize:16,cursor:"pointer",color:C.blushDeep,flexShrink:0}}>←</button>
              <div style={{flex:1,textAlign:"center",background:"#fff",borderRadius:10,padding:"9px 6px",border:`1px solid ${C.blush}`}}>

                {wbData[ciDate]&&<p style={{fontFamily:F,fontSize:11,color:C.blushDeep,margin:"2px 0 0",fontWeight:600}}>Saved</p>}
              </div>
              <button onClick={()=>{const d=new Date(ciDate+"T00:00:00");d.setDate(d.getDate()+7);const n=d.toISOString().split("T")[0];if(n<=toDay())setCIDate(n);}} style={{width:38,height:38,borderRadius:10,border:`1.5px solid ${C.blush}`,background:"#fff",fontSize:16,cursor:"pointer",color:C.blushDeep,flexShrink:0,opacity:ciDate>=toDay()?0.3:1}}>→</button>
            </div>
            <p style={{fontFamily:F,fontSize:11,color:C.textSoft,margin:"0 0 12px"}}>Use arrows to jump week by week</p>
            <p style={{fontFamily:F,fontSize:11,color:C.blushDeep,margin:"0 0 8px",fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase"}}>Core Metrics</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              {CORE.map(({k,l,u})=><WBField key={k} label={l} unit={u} value={curWB[k]} onChange={v=>updWB(k,v)}/>)}
            </div>
            <button onClick={()=>setShowAdv(!showAdv)} style={{width:"100%",padding:"10px",borderRadius:10,border:`1px solid ${C.blush}`,background:"rgba(255,255,255,0.6)",color:C.textSoft,fontFamily:F,fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:showAdv?12:0}}>
              {showAdv?"Hide Advanced":"Show Advanced"}
            </button>
            {showAdv&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14,marginTop:12}}>
                {ADV.map(({k,l,u})=><WBField key={k} label={l} unit={u} value={curWB[k]} onChange={v=>updWB(k,v)}/>)}
              </div>
            )}
            {wbE.length>0&&(
              <div style={{marginTop:16}}>
                <p style={{fontFamily:F,fontSize:11,color:C.textLight,marginBottom:8,letterSpacing:"0.06em",textTransform:"uppercase"}}>All check-ins</p>
                <div style={{maxHeight:160,overflowY:"auto"}}>
                  {wbE.slice().reverse().map(([dt,w])=>(
                    <div key={dt} onClick={()=>setCIDate(dt)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",borderRadius:10,background:dt===ciDate?"#fff":"rgba(255,255,255,0.5)",border:`1px solid ${dt===ciDate?C.blushDeep:C.blush}`,marginBottom:5,cursor:"pointer"}}>
                      <span style={{fontFamily:F,fontSize:13,fontWeight:dt===ciDate?700:400,color:dt===ciDate?C.blushDeep:C.text}}>{dt}</span>
                      <span style={{fontFamily:F,fontSize:12,color:C.textSoft}}>{w.weight?`${w.weight}kg`:""}{w.bodyFat?` ${w.bodyFat}%fat`:""}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
        {latWB&&!showCI&&(
          <div>
            <p style={{fontFamily:F,fontSize:11,color:C.textLight,marginBottom:10}}>Latest: {wbE[wbE.length-1][0]}</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {CORE.filter(f=>latWB[f.k]).map(({k,l,u})=>(
                <div key={k} style={{background:"rgba(255,255,255,0.8)",borderRadius:10,padding:"10px 12px",border:`1px solid ${C.blush}`}}>
                  <p style={{fontFamily:F,fontSize:10,color:C.textLight,margin:"0 0 3px",textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</p>
                  <p style={{fontFamily:F,fontSize:15,fontWeight:700,color:C.text,margin:0}}>{latWB[k]}{u?" "+u:""}</p>
                </div>
              ))}
            </div>
          </div>
        )}
        {!latWB&&!showCI&&(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <p style={{fontSize:32,margin:"0 0 8px"}}>⚖️</p>
            <p style={{fontFamily:F,fontSize:13,color:C.textLight,fontStyle:"italic"}}>Tap "+ Add" to start entering your Eufy data</p>
          </div>
        )}
      </Card>

      <Card style={{border:`1.5px solid ${C.lavender}`,background:C.lavLight}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div>
            <Title style={{margin:0}}>Measurements 📏</Title>
            <p style={{fontFamily:F,fontSize:12,color:C.textSoft,margin:"4px 0 0"}}>Monthly - these change when the scale doesn't</p>
          </div>
          <button onClick={()=>setShowMeas(!showMeas)} style={{padding:"8px 16px",borderRadius:12,border:`1.5px solid ${C.lavender}`,background:showMeas?C.lavender:"transparent",color:showMeas?"#fff":C.lavender,fontFamily:F,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
            {showMeas?"Done":"+ Add"}
          </button>
        </div>
        {showMeas&&(
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,marginTop:12}}>
              <button onClick={()=>{const d=new Date(measDate+"T00:00:00");d.setMonth(d.getMonth()-1);setMeasDate(d.toISOString().split("T")[0]);}} style={{width:36,height:36,borderRadius:10,border:`1.5px solid ${C.lavender}`,background:"#fff",fontSize:15,cursor:"pointer",color:C.lavender,flexShrink:0}}>←</button>
              <div style={{flex:1,textAlign:"center",background:"#fff",borderRadius:10,padding:"8px",border:`1px solid ${C.lavender}`}}>
                <p style={{fontFamily:F,fontSize:13,fontWeight:700,color:C.text,margin:0}}>{new Date(measDate+"T00:00:00").toLocaleDateString("default",{month:"long",year:"numeric"})}</p>
                {measData[measDate]&&<p style={{fontFamily:F,fontSize:11,color:C.lavender,margin:"2px 0 0",fontWeight:600}}>Saved</p>}
              </div>
              <button onClick={()=>{const d=new Date(measDate+"T00:00:00");d.setMonth(d.getMonth()+1);const n=d.toISOString().split("T")[0];if(n<=toDay())setMeasDate(n);}} style={{width:36,height:36,borderRadius:10,border:`1.5px solid ${C.lavender}`,background:"#fff",fontSize:15,cursor:"pointer",color:C.lavender,flexShrink:0}}>→</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {MEAS.map(({k,l,u})=>(
                <div key={k}>
                  <p style={{fontFamily:F,fontSize:11,color:C.textSoft,marginBottom:4,fontWeight:600}}>{l} ({u})</p>
                  <input type="text" inputMode="decimal" value={curMeas[k]||""} onChange={e=>updMeas(k,e.target.value)} placeholder="-"
                    style={{border:`1.5px solid ${curMeas[k]?C.lavender:C.border}`,borderRadius:10,padding:"9px 12px",fontSize:13,fontFamily:F,color:C.text,background:"#fff",width:"100%",boxSizing:"border-box",outline:"none"}}/>
                </div>
              ))}
            </div>
          </div>
        )}
        {latMeas&&!showMeas&&(
          <div>
            <p style={{fontFamily:F,fontSize:11,color:C.textLight,marginBottom:10}}>Latest: {measE[measE.length-1][0]}</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {MEAS.filter(f=>latMeas[f.k]).map(({k,l,u})=>(
                <div key={k} style={{background:"rgba(255,255,255,0.8)",borderRadius:10,padding:"10px 12px",border:`1px solid ${C.lavender}30`}}>
                  <p style={{fontFamily:F,fontSize:10,color:C.textLight,margin:"0 0 3px",textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</p>
                  <p style={{fontFamily:F,fontSize:15,fontWeight:700,color:C.text,margin:0}}>{latMeas[k]} {u}</p>
                </div>
              ))}
            </div>
          </div>
        )}
        {!latMeas&&!showMeas&&(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <p style={{fontSize:32,margin:"0 0 8px"}}>📏</p>
            <p style={{fontFamily:F,fontSize:13,color:C.textLight,fontStyle:"italic"}}>Tap "+ Add" to log your measurements</p>
          </div>
        )}
      </Card>

      <Card>
        <Title>Progress Photos 📷</Title>
        <p style={{fontFamily:F,fontSize:12,color:C.textLight,marginBottom:14}}>Stored privately on your device only.</p>
        <Photos photos={allPhotos} onAdd={addPhoto} onRemove={removePhoto}/>
      </Card>
    </div>
  );
}

function Insightz({data,profile}) {
  const ins=insights(data);
  const ents=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));
  const notes=ents.filter(([,d])=>d.notes||d.morningNote);
  const wd=weekDays(0), wf=wd.map(d=>data[d]?.fitness||{}), ws=wd.map(d=>data[d]?.sleep||{}).filter(s=>s.hrs), wb=wd.map(d=>data[d]?.body||{});
  return (
    <div>
      <Card style={{background:`linear-gradient(135deg,${C.lavLight},${C.blushLight})`,border:`1px solid ${C.border}`}}>
        <Title>This Week 🌸</Title>
        {[["Days logged",wd.filter(d=>data[d]).length,"/ 7"],["Gym sessions",cy(wf,"gym"),""],["Avg sleep",av(ws,"hrs"),"hrs"],["Avg mood",av(wb,"mood"),"/ 10"],["Avg energy",av(wb,"energy"),"/ 10"],["Total steps",sm(wf,"steps").toLocaleString(),""],["Total water",(sm(wf,"water")*0.5).toFixed(1),"L"]].map(([l,v,u])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid rgba(184,92,130,0.12)`}}>
            <span style={{fontFamily:F,fontSize:13,color:C.textSoft}}>{l}</span>
            <span style={{fontFamily:F,fontSize:14,fontWeight:700,color:C.text}}>{v!=null?v:"–"}{v!=null&&u?" "+u:""}</span>
          </div>
        ))}
      </Card>
      <Card>
        <Title>Personal Insights ✨</Title>
        {ins.length===0&&<div style={{textAlign:"center",padding:"20px 0"}}><p style={{fontSize:32,margin:"0 0 8px"}}>🌱</p><p style={{fontFamily:F,fontSize:13,color:C.textLight,fontStyle:"italic"}}>Log at least 5 days to unlock insights</p></div>}
        {ins.map((x,i)=>(
          <div key={i} style={{display:"flex",gap:14,padding:"14px 0",borderBottom:`1px solid ${C.borderSoft}`}}>
            <span style={{fontSize:26}}>{x.icon}</span>
            <p style={{fontFamily:F,fontSize:13,color:C.text,margin:0,lineHeight:1.7}}>{x.text}</p>
          </div>
        ))}
      </Card>
      <Card>
        <Title>Export Data</Title>
        <p style={{fontFamily:F,fontSize:13,color:C.textSoft,marginBottom:14}}>Download all your data as a CSV.</p>
        <button onClick={()=>doCSV(data)} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:`linear-gradient(135deg,${C.blushDeep},#a04070)`,color:"#fff",fontFamily:F,fontSize:14,fontWeight:700,cursor:"pointer"}}>Download CSV</button>
      </Card>
      {notes.length>0&&(
        <Card>
          <Title>Your Journal 📖</Title>
          {notes.slice().reverse().map(([dt,d],i)=>(
            <div key={i} style={{padding:"14px 0",borderBottom:`1px solid ${C.borderSoft}`}}>
              <p style={{fontFamily:F,fontSize:10,letterSpacing:"0.08em",textTransform:"uppercase",color:C.textLight,margin:"0 0 8px"}}>{dt}</p>
              {d.morningNote&&<p style={{fontFamily:F,fontSize:13,color:C.textSoft,margin:"0 0 5px",lineHeight:1.6}}>🌅 {d.morningNote}</p>}
              {d.notes&&<p style={{fontFamily:F,fontSize:13,color:C.textSoft,margin:0,lineHeight:1.6}}>📝 {d.notes}</p>}
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────

function App() {
  const [data,setDataRaw]=useState({});
  const [profile,setProfileRaw]=useState({height:"165",cycleStart:null,cycleHist:[]});
  const [tab,setTab]=useState(0);
  const [sel,setSel]=useState(toDay());
  const [off,setOff]=useState(0);

  useEffect(()=>{
    const d=loadD();
    migrate(d);
    setDataRaw(loadD());
    setProfileRaw(loadP());
  },[]);

  function setData(d){setDataRaw(d);saveD(d);}
  function setProfile(p){setProfileRaw(p);saveP(p);}

  function goDay(delta){
    const n=off+delta;
    if(n>0) return;
    setOff(n); setSel(offDay(n));
  }

  const ents=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:F}}>
      <div style={{background:"rgba(253,246,240,0.96)",backdropFilter:"blur(10px)",borderBottom:`1px solid ${C.border}`,padding:"16px 20px 0",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <p style={{fontFamily:FS,fontSize:22,color:C.text,margin:0,fontWeight:500}}>My Health 🌸</p>
          <p style={{fontFamily:F,fontSize:10,color:C.textLight,margin:0,letterSpacing:"0.06em",textTransform:"uppercase"}}>private</p>
        </div>
        <div style={{display:"flex",gap:0,overflowX:"auto",marginLeft:-4}}>
          {TABS.map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)} style={{padding:"8px 11px",borderRadius:"12px 12px 0 0",border:"none",background:tab===i?"#fff":"transparent",color:tab===i?C.blushDeep:C.textLight,fontFamily:F,fontSize:11,fontWeight:tab===i?700:400,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,borderBottom:tab===i?`2px solid ${C.blushDeep}`:"2px solid transparent"}}>
              {TAB_ICONS[i]} {t}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"16px 16px 100px",maxWidth:500,margin:"0 auto"}}>
        {tab===0&&<Home data={data} profile={profile} setTab={setTab}/>}
        {tab===1&&<Log data={data} setData={setData} profile={profile} setProfile={setProfile} sel={sel} off={off} goDay={goDay}/>}
        {tab===2&&<Sleep entries={ents}/>}
        {tab===3&&<Fitness data={data}/>}
        {tab===4&&<Body data={data} setData={setData} profile={profile} setProfile={setProfile}/>}
        {tab===5&&<Insightz data={data} profile={profile}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
