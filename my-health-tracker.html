<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="My Health"/>
  <title>My Health</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #e8dff0; font-family: 'Raleway', sans-serif; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #d4c4e4; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #c55a30; cursor: pointer; box-shadow: 0 2px 8px rgba(197,90,48,0.3); }
    input:focus, textarea:focus, button:focus { outline: none; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Design tokens ────────────────────────────────────────────────
const C = {
  bg:         "#e8dff0",
  bgCard:     "#f0e8f8",
  bgWhite:    "#ffffff",
  bgDark:     "#2a1f35",
  coral:      "#c55a30",
  coralLight: "#fde8e0",
  lavender:   "#d4c4e4",
  lavDark:    "#6a5878",
  lavMid:     "#9888b0",
  plum:       "#2a1f35",
  text:       "#2a1f35",
  textSoft:   "#6a5878",
  textMuted:  "#9888b0",
  border:     "#d8c8e8",
  borderSoft: "#e4d8f0",
};

const FP = "'Playfair Display', serif";
const FR = "'Raleway', sans-serif";

const CYCLE_PHASES = [
  { name:"Menstrual", days:[1,5], color:"#c55a30", bg:"linear-gradient(145deg,#f8ede8,#f4e0d8)", emoji:"🌸",
    exercise:"Gentle yoga, stretching, short walks. Honor rest.",
    food:"Iron-rich foods, leafy greens. Warm nourishing meals.",
    supplements:"Iron, Magnesium, Vitamin C.",
    sleep:"Prioritize extra sleep. Your body is working hard." },
  { name:"Follicular", days:[6,13], color:"#5a8a5a", bg:"linear-gradient(145deg,#eaf4ea,#e0f0e0)", emoji:"🌱",
    exercise:"Energy rising — strength training, cardio, new workouts.",
    food:"Lighter foods, lean proteins, fermented foods.",
    supplements:"B vitamins, Zinc, Probiotics.",
    sleep:"Sleep quality improves. Aim for 7-9 hrs." },
  { name:"Ovulation", days:[14,16], color:"#b87830", bg:"linear-gradient(145deg,#fdf0e0,#f8e8d0)", emoji:"✨",
    exercise:"Peak energy — HIIT, heavy lifts, competitive sports.",
    food:"Anti-inflammatory: berries, flaxseed, fiber-rich veg.",
    supplements:"Vitamin E, Antioxidants, Omega-3.",
    sleep:"May notice lighter sleep. Wind down well." },
  { name:"Luteal", days:[17,35], color:"#7058a8", bg:"linear-gradient(145deg,#f0eaf8,#e8e0f0)", emoji:"🌙",
    exercise:"Slow down. Pilates, swimming, moderate walks.",
    food:"Complex carbs, dark chocolate, pumpkin seeds, bananas.",
    supplements:"Magnesium, Vitamin B6, Evening Primrose Oil.",
    sleep:"Sleep may be disrupted. Limit screens and caffeine." },
];

const TABS = ["Home","Log","Sleep","Fitness","Body","Insights"];
const TAB_ICONS = ["🏠","📝","🌙","🏃","✨","💡"];
const SK = "my_health_james_v2";

function getPhase(day) {
  if (!day || day < 1) return null;
  for (const p of CYCLE_PHASES) if (day >= p.days[0] && day <= p.days[1]) return p;
  return CYCLE_PHASES[3];
}

const toDay = () => new Date().toISOString().split("T")[0];
function offDay(n) { const d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().split("T")[0]; }
function daysBetween(a, b) { return Math.round((new Date(a+"T00:00:00") - new Date(b+"T00:00:00")) / 86400000); }
function cycleDay(sel, start) { if (!start) return null; const d = daysBetween(sel, start); return d < 0 ? null : d + 1; }

function fmtLabel(s) {
  const t=toDay(), y=offDay(-1);
  if (s===t) return "Today"; if (s===y) return "Yesterday";
  return new Date(s+"T00:00:00").toLocaleDateString("default",{weekday:"short",month:"short",day:"numeric"});
}
function fmtFull(s) { return new Date(s+"T00:00:00").toLocaleDateString("default",{weekday:"long",month:"long",day:"numeric"}); }

function parseW(v) { if (v===""||v===null||v===undefined) return null; const n=parseFloat(String(v).replace(",",".")); return isNaN(n)?null:n; }
function fmtW(v) { const n=parseW(v); if (n===null) return null; return Number.isInteger(n)?String(n):n.toFixed(2).replace(/\.?0+$/,""); }
function calcBMI(w,h) { const ww=parseW(w),hh=parseFloat(h); if(!ww||!hh) return null; return (ww/((hh/100)*(hh/100))).toFixed(1); }

function av(arr,key) { const v=arr.map(d=>parseFloat(d[key])).filter(x=>!isNaN(x)); return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):null; }
function sm(arr,key) { return arr.map(d=>parseFloat(d[key])).filter(x=>!isNaN(x)).reduce((a,b)=>a+b,0); }
function cy(arr,key) { return arr.filter(d=>d[key]===true).length; }

function weekDays(off=0) {
  const now=new Date(), mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7)+off*7);
  const r=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);r.push(d.toISOString().split("T")[0]);}
  return r;
}

function loadD() { try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{}}catch{return{}} }
function saveD(d) { try{localStorage.setItem(SK,JSON.stringify(d))}catch{} }
function loadP() { try{const r=localStorage.getItem(SK+"_p");return r?JSON.parse(r):{height:"165",cycleStart:null,cycleHist:[]}}catch{return{height:"165",cycleStart:null,cycleHist:[]}} }
function saveP(p) { try{localStorage.setItem(SK+"_p",JSON.stringify(p))}catch{} }
function loadWB() { try{const r=localStorage.getItem(SK+"_wb");return r?JSON.parse(r):{}}catch{return{}} }
function saveWB(d) { try{localStorage.setItem(SK+"_wb",JSON.stringify(d))}catch{} }
function loadMeas() { try{const r=localStorage.getItem(SK+"_meas");return r?JSON.parse(r):{}}catch{return{}} }
function saveMeas(d) { try{localStorage.setItem(SK+"_meas",JSON.stringify(d))}catch{} }

function migrate(data) {
  const OLD=["my_health_tracker_v1","aj_health_tracker_v1","aj_health_tracker_v2"];
  try {
    if(Object.keys(data).length>0) return;
    for(const k of OLD){const r=localStorage.getItem(k);if(r){const p=JSON.parse(r);if(Object.keys(p).length>0){localStorage.setItem(SK,r);return;}}}
  } catch {}
}

function emptyDay() {
  return { sleep:{hrs:"",mins:"",rem:"",deep:"",light:"",awake:""}, fitness:{gym:null,steps:"",restDay:false,walk:null,sauna:null,water:""}, body:{mood:"",energy:""}, notes:"", morningNote:"", photos:[] };
}
function emptyWB() {
  return {weight:"",bmi:"",bodyFat:"",bodyFatMass:"",muscleMass:"",skeletalMuscle:"",leanBodyMass:"",water:"",visceralFat:"",bmr:"",boneMass:"",protein:"",subcutaneousFat:"",bodyAge:"",bodyType:""};
}

function logStreak(data) { let s=0;const d=new Date();for(let i=0;i<365;i++){const k=d.toISOString().split("T")[0];if(data[k]){s++;d.setDate(d.getDate()-1);}else break;}return s; }
function gymStreak(data) { let s=0;const d=new Date();for(let i=0;i<365;i++){const k=d.toISOString().split("T")[0];const e=data[k];if(!e){d.setDate(d.getDate()-1);if(i>0)break;continue;}if(e.fitness?.gym===true){s++;d.setDate(d.getDate()-1);}else break;}return s; }
function waterStreak(data,t=4) { let s=0;const d=new Date();for(let i=0;i<365;i++){const k=d.toISOString().split("T")[0];const e=data[k];if(e&&parseInt(e.fitness?.water||0)>=t){s++;d.setDate(d.getDate()-1);}else break;}return s; }

function genInsights(data) {
  const ins=[],e=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));
  if(e.length<5) return [];
  const ws=e.filter(([,d])=>d.fitness?.walk===true&&d.sleep?.hrs).map(([,d])=>parseFloat(d.sleep.hrs)).filter(v=>!isNaN(v));
  const nws=e.filter(([,d])=>d.fitness?.walk===false&&d.sleep?.hrs).map(([,d])=>parseFloat(d.sleep.hrs)).filter(v=>!isNaN(v));
  if(ws.length>=3&&nws.length>=3){const wA=ws.reduce((a,b)=>a+b,0)/ws.length,nA=nws.reduce((a,b)=>a+b,0)/nws.length;if(wA-nA>0.3)ins.push({icon:"🚶",text:`You sleep ${(wA-nA).toFixed(1)} hrs more on days you walk outside.`});}
  const gm=e.filter(([,d])=>d.fitness?.gym===true&&d.body?.mood).map(([,d])=>parseFloat(d.body.mood)).filter(v=>!isNaN(v));
  const ngm=e.filter(([,d])=>d.fitness?.gym===false&&d.body?.mood).map(([,d])=>parseFloat(d.body.mood)).filter(v=>!isNaN(v));
  if(gm.length>=3&&ngm.length>=3){const gA=gm.reduce((a,b)=>a+b,0)/gm.length,nA=ngm.reduce((a,b)=>a+b,0)/ngm.length;if(gA-nA>0.5)ins.push({icon:"🏋️",text:`Your mood is ${(gA-nA).toFixed(1)} pts higher on gym days.`});}
  const sh=e.filter(([,d])=>d.sleep?.hrs).map(([,d])=>parseFloat(d.sleep.hrs)).filter(v=>!isNaN(v));
  if(sh.length>=7){const sA=(sh.reduce((a,b)=>a+b,0)/sh.length).toFixed(1);ins.push({icon:"😴",text:parseFloat(sA)<7?`Your avg sleep is ${sA} hrs — aim for 7-9 hrs.`:`You average ${sA} hrs of sleep. Beautiful consistency.`});}
  const wd=e.filter(([,d])=>parseInt(d.fitness?.water||0)>=4).length;
  if(e.length>=5){const p=Math.round((wd/e.length)*100);ins.push({icon:"💧",text:p>=70?`Water goal hit ${p}% of days — excellent.`:`Water goal hit ${p}% of days. Keep a bottle visible.`});}
  return ins.slice(0,6);
}

function doCSV(data) {
  const rows=[["Date","Sleep Hrs","Sleep Mins","REM%","Deep%","Light%","Awake%","Gym","Steps","Rest","Walk","Sauna","Water","Mood","Energy","Morning Note","Notes"]];
  for(const [d,v] of Object.entries(data).sort(([a],[b])=>a.localeCompare(b)))
    rows.push([d,v.sleep?.hrs||"",v.sleep?.mins||"",v.sleep?.rem||"",v.sleep?.deep||"",v.sleep?.light||"",v.sleep?.awake||"",v.fitness?.gym===true?"Yes":v.fitness?.gym===false?"No":"",v.fitness?.steps||"",v.fitness?.restDay?"Yes":"No",v.fitness?.walk===true?"Yes":v.fitness?.walk===false?"No":"",v.fitness?.sauna===true?"Yes":v.fitness?.sauna===false?"No":"",v.fitness?.water||"",v.body?.mood||"",v.body?.energy||"",`"${(v.morningNote||"").replace(/"/g,'""')}"`,`"${(v.notes||"").replace(/"/g,'""')}"`]);
  const csv=rows.map(r=>r.join(",")).join("\n"),blob=new Blob([csv],{type:"text/csv"}),url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download="my-health.csv";a.click();URL.revokeObjectURL(url);
}

// ── Primitives ───────────────────────────────────────────────────

function Card({children, style={}}) {
  return <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:20,padding:"22px",marginBottom:12,boxShadow:"0 2px 16px rgba(42,31,53,0.06)",...style}}>{children}</div>;
}

function CardWhite({children, style={}}) {
  return <div style={{background:C.bgWhite,border:`1px solid ${C.borderSoft}`,borderRadius:20,padding:"22px",marginBottom:12,boxShadow:"0 2px 16px rgba(42,31,53,0.05)",...style}}>{children}</div>;
}

function CardDark({children, style={}}) {
  return <div style={{background:`linear-gradient(145deg,#2a1f35,#3a2845)`,borderRadius:20,padding:"22px",marginBottom:12,...style}}>{children}</div>;
}

function H1({children, italic, color, style={}}) {
  return <p style={{fontFamily:FP,fontSize:22,fontWeight:600,color:color||C.text,fontStyle:italic?"italic":"normal",marginBottom:14,marginTop:2,...style}}>{children}</p>;
}

function Lbl({children, color}) {
  return <p style={{fontFamily:FR,fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:color||C.coral,marginBottom:6}}>{children}</p>;
}

function LblMuted({children}) {
  return <p style={{fontFamily:FR,fontSize:9,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:C.textMuted,marginBottom:6}}>{children}</p>;
}

function Row({label, value, unit=""}) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.borderSoft}`}}>
      <span style={{fontFamily:FR,fontSize:13,fontWeight:500,color:C.textMuted}}>{label}</span>
      <span style={{fontFamily:FP,fontSize:15,fontWeight:600,color:C.text}}>{value!=null?value:"—"}{value!=null&&unit?" "+unit:""}</span>
    </div>
  );
}

function YN({value, onChange}) {
  const btn=(lbl,val)=>(
    <button onClick={()=>onChange(val)} style={{flex:1,padding:"11px 0",borderRadius:12,border:`1.5px solid ${value===val?C.coral:C.border}`,background:value===val?C.coral:"transparent",color:value===val?"#fff":C.textSoft,fontFamily:FR,fontSize:12,fontWeight:700,letterSpacing:"0.06em",cursor:"pointer",transition:"all 0.2s"}}>{lbl}</button>
  );
  return <div style={{display:"flex",gap:8}}>{btn("Yes",true)}{btn("No",false)}</div>;
}

function Slide({value, onChange}) {
  const n=parseInt(value)||0;
  const em=n<=3?"😔":n<=6?"😊":n<=8?"😄":"🤩";
  return (
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <input type="range" min={1} max={10} value={value||1} onChange={e=>onChange(e.target.value)} style={{flex:1}}/>
      <div style={{display:"flex",alignItems:"center",gap:6,minWidth:50}}>
        {value?<span style={{fontSize:16}}>{em}</span>:null}
        <span style={{fontFamily:FP,fontSize:20,fontWeight:600,color:C.coral}}>{value||"—"}</span>
      </div>
    </div>
  );
}

function StreakBadge({count, label, icon}) {
  const on=count>0;
  return (
    <div style={{flex:1,background:on?"rgba(197,90,48,0.08)":"rgba(255,255,255,0.4)",border:`1.5px solid ${on?C.coral:C.border}`,borderRadius:16,padding:"16px 8px",textAlign:"center"}}>
      <div style={{fontSize:22,marginBottom:6}}>{icon}</div>
      <p style={{fontFamily:FP,fontSize:26,fontWeight:700,color:on?C.coral:C.lavMid,margin:0}}>{count}</p>
      <p style={{fontFamily:FR,fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:on?C.coral:C.lavMid,margin:"4px 0 0"}}>{label}</p>
    </div>
  );
}

function LineChart({pts, color, h=65}) {
  const c=color||C.coral;
  if(!pts||pts.length<2) return <p style={{fontFamily:FR,fontSize:12,color:C.textMuted,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>Not enough data yet</p>;
  const vals=pts.map(p=>p.y),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=280,H=h,pd=10;
  const xs=pts.map((_,i)=>pd+(i/(pts.length-1))*(W-pd*2));
  const ys=pts.map(p=>H-pd-((p.y-mn)/rng)*(H-pd*2));
  const path=xs.map((x,i)=>`${i===0?"M":"L"} ${x} ${ys[i]}`).join(" ");
  const fill=path+` L ${xs[xs.length-1]} ${H} L ${xs[0]} ${H} Z`;
  const id=`g${c.replace(/[^a-z0-9]/gi,"")}${Math.random().toString(36).substr(2,4)}`;
  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
        <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity="0.2"/><stop offset="100%" stopColor={c} stopOpacity="0"/></linearGradient></defs>
        <path d={fill} fill={`url(#${id})`}/>
        <path d={path} fill="none" stroke={c} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=><circle key={i} cx={xs[i]} cy={ys[i]} r={4} fill="#fff" stroke={c} strokeWidth={2}/>)}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <span style={{fontFamily:FR,fontSize:10,color:C.textMuted}}>{pts[0].label||pts[0].x}</span>
        <span style={{fontFamily:FR,fontSize:10,color:C.textMuted}}>{pts[pts.length-1].label||pts[pts.length-1].x}</span>
      </div>
    </div>
  );
}

function MultiLine({series, h=80}) {
  const all=series.flatMap(s=>s.pts);
  if(all.length<2) return <p style={{fontFamily:FR,fontSize:12,color:C.textMuted,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>Not enough data yet</p>;
  const vals=all.map(p=>p.y),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=280,H=h,pd=10;
  const allX=[...new Set(all.map(p=>p.x))].sort();
  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
        {series.map((s,si)=>{
          if(s.pts.length<2) return null;
          const xs=s.pts.map(p=>pd+(allX.indexOf(p.x)/(allX.length-1||1))*(W-pd*2));
          const ys=s.pts.map(p=>H-pd-((p.y-mn)/rng)*(H-pd*2));
          const path=xs.map((x,i)=>`${i===0?"M":"L"} ${x} ${ys[i]}`).join(" ");
          return <path key={si} d={path} fill="none" stroke={s.color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>;
        })}
        {series.map((s,si)=>s.pts.map((p,i)=>{
          const x=pd+(allX.indexOf(p.x)/(allX.length-1||1))*(W-pd*2);
          const y=H-pd-((p.y-mn)/rng)*(H-pd*2);
          return <circle key={`${si}-${i}`} cx={x} cy={y} r={3} fill="#fff" stroke={s.color} strokeWidth={2}/>;
        }))}
      </svg>
      <div style={{display:"flex",gap:14,marginTop:8,flexWrap:"wrap"}}>
        {series.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:12,height:3,borderRadius:2,background:s.color}}/><span style={{fontFamily:FR,fontSize:11,color:C.textSoft}}>{s.label}</span></div>)}
      </div>
    </div>
  );
}

function BarChart({pts, color, h=65}) {
  const c=color||C.coral;
  if(!pts||!pts.some(p=>p.y>0)) return <p style={{fontFamily:FR,fontSize:12,color:C.textMuted,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>No data yet</p>;
  const mx=Math.max(...pts.map(p=>p.y),1),W=280,H=h,bw=(W/pts.length)-5;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      {pts.map((p,i)=>{const x=i*(W/pts.length)+2.5,bh=Math.max(p.y>0?4:0,(p.y/mx)*(H-16));return(
        <g key={i}>
          <rect x={x} y={H-bh-14} width={bw} height={bh} rx={4} fill={p.y>0?c:C.borderSoft}/>
          <text x={x+bw/2} y={H-1} textAnchor="middle" fill={C.textMuted} fontSize={9} fontFamily={FR}>{p.label||""}</text>
        </g>
      );})}
    </svg>
  );
}

function PhotoLogger({photos, onAdd, onRemove}) {
  const ref=useRef();
  function handle(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onAdd({src:ev.target.result,ts:Date.now()});r.readAsDataURL(f);e.target.value="";}
  return (
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {(photos||[]).map((p,i)=>(
        <div key={i} style={{position:"relative"}}>
          <img src={p.src} alt="" style={{width:76,height:76,objectFit:"cover",borderRadius:14,border:`2px solid ${C.border}`}}/>
          <button onClick={()=>onRemove(i)} style={{position:"absolute",top:-6,right:-6,width:22,height:22,borderRadius:"50%",background:C.coral,color:"#fff",border:"none",fontSize:12,cursor:"pointer"}}>x</button>
        </div>
      ))}
      <button onClick={()=>ref.current.click()} style={{width:76,height:76,borderRadius:14,border:`2px dashed ${C.lavender}`,background:"rgba(255,255,255,0.5)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
        <span style={{fontSize:22,color:C.coral}}>+</span>
        <span style={{fontFamily:FR,fontSize:10,color:C.coral,fontWeight:700}}>Photo</span>
      </button>
      <input ref={ref} type="file" accept="image/*" onChange={handle} style={{display:"none"}}/>
    </div>
  );
}

function WBField({label, unit, value, onChange}) {
  return (
    <div>
      <p style={{fontFamily:FR,fontSize:10,color:C.textSoft,marginBottom:4,fontWeight:600,letterSpacing:"0.06em"}}>{label}{unit?" ("+unit+")":""}</p>
      <input type="text" inputMode="decimal" value={value||""} onChange={e=>onChange(e.target.value)} placeholder="—"
        style={{border:`1.5px solid ${value?C.coral:C.border}`,borderRadius:10,padding:"9px 12px",fontSize:13,fontFamily:FR,color:C.text,background:"#fff",width:"100%",boxSizing:"border-box",outline:"none",fontWeight:500}}/>
    </div>
  );
}

function NumIn({value, onChange, placeholder, max, inputMode="numeric"}) {
  return <input type="number" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} max={max} inputMode={inputMode}
    style={{border:`1.5px solid ${C.border}`,borderRadius:12,padding:"11px 14px",fontSize:14,fontFamily:FR,color:C.text,background:"rgba(255,255,255,0.7)",width:"100%",boxSizing:"border-box",outline:"none",fontWeight:500}}/>;
}

function TextArea({value, onChange, placeholder}) {
  return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3}
    style={{border:`1.5px solid ${C.border}`,borderRadius:12,padding:"12px 14px",fontSize:13,fontFamily:FR,color:C.text,background:"rgba(255,255,255,0.7)",width:"100%",boxSizing:"border-box",outline:"none",resize:"none",lineHeight:1.6,fontWeight:500}}/>;
}

// ── Home ─────────────────────────────────────────────────────────

        </div>

          <div style={{display:"grid",gridTemplateColumns:latW&&cd?"1fr 1fr":"1fr",gap:8,marginTop:8}}>

// ── Log ──────────────────────────────────────────────────────────

  return (
    <div>

        <button onClick={()=>goDay(-1)} style={{width:42,height:42,borderRadius:12,border:`1.5px solid ${C.border}`,background:"rgba(255,255,255,0.6)",fontSize:18,cursor:"pointer",color:C.textSoft}}>&#8249;</button>
        <div style={{background:off===0?C.coral:"rgba(255,255,255,0.6)",borderRadius:14,padding:"8px 22px",textAlign:"center",border:`1.5px solid ${off===0?C.coral:C.border}`}}>

      </div>

      {cd&&ph&&(
        <div style={{display:"flex",alignItems:"center",gap:10,background:ph.bg,borderRadius:14,padding:"12px 16px",marginBottom:12,border:`1px solid ${ph.color}30`}}>
          <span style={{fontSize:22}}>{ph.emoji}</span>
          <div>
            <p style={{fontFamily:FR,fontSize:10,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:ph.color,margin:0}}>Day {cd} — {ph.name} Phase</p>

        <div style={{display:"flex",gap:6,marginBottom:6}}>

            const mo=parseInt(parts[1])||new Date().getMonth()+1;
            const dy=parseInt(parts[2])||new Date().getDate();
            const days=new Date(yr,mo,0).getDate();
            const sel=(y,m,dd)=>{
              const nd=`${y}-${String(m).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
              if(nd>toDay()) return;
              const np={...profile};
              if(profile.cycleStart&&profile.cycleStart!==nd){const len=daysBetween(nd,profile.cycleStart);if(len>0)np.cycleHist=[...(profile.cycleHist||[]),{start:profile.cycleStart,length:len}].slice(-12);}
              np.cycleStart=nd; setProfile(np); saveP(np);
            };
            const ss={border:`1.5px solid ${C.border}`,borderRadius:10,padding:"10px 6px",fontSize:13,fontFamily:FR,color:C.text,background:"rgba(255,255,255,0.7)",boxSizing:"border-box",outline:"none",cursor:"pointer",WebkitAppearance:"none",textAlign:"center",fontWeight:600};

                <select value={yr} onChange={e=>sel(parseInt(e.target.value),mo,dy)} style={{...ss,flex:"1.2"}}>

                </select>
              </>
            );

        <LblMuted>Energy (1-10)</LblMuted>
        <Slide value={d.body.energy} onChange={v=>upd("body","energy",v)}/>
      </Card>

      <Card>
        <H1 italic>Notes 📝</H1>
        <TextArea value={d.notes||""} onChange={v=>updTop("notes",v)} placeholder="PBs, symptoms, food, anything on your mind..."/>
      </Card>
    </div>
  );
}

// ── Sleep ────────────────────────────────────────────────────────

function Sleep({entries}) {
  const se=entries.map(([dt,d])=>({dt,...d.sleep})).filter(e=>e.hrs);
  const l7=se.slice(-7);
  const durP=l7.map(e=>({x:e.dt,y:parseFloat(e.hrs),label:e.dt.slice(5)}));
  const remP=l7.filter(e=>e.rem).map(e=>({x:e.dt,y:parseFloat(e.rem),label:e.dt.slice(5)}));
  const depP=l7.filter(e=>e.deep).map(e=>({x:e.dt,y:parseFloat(e.deep),label:e.dt.slice(5)}));
  const awP=l7.filter(e=>e.awake).map(e=>({x:e.dt,y:parseFloat(e.awake),label:e.dt.slice(5)}));
  return (
    <div>
      <CardDark>
        <H1 color="#f0e8f8">Sleep Overview 🌙</H1>
        {[["Avg Duration",av(se,"hrs"),"hrs","#e8c8f0"],["Avg REM",av(se,"rem"),"%","#c8b0e0"],["Avg Deep",av(se,"deep"),"%","#b898d8"],["Avg Light",av(se,"light"),"%","#c8d8e8"],["Avg Awake",av(se,"awake"),"%","#e8c8a8"],["Days Logged",se.length,"","#f0d0c8"]].map(([l,v,u,col])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
            <span style={{fontFamily:FR,fontSize:13,fontWeight:500,color:"rgba(255,255,255,0.6)"}}>{l}</span>
            <span style={{fontFamily:FP,fontSize:15,fontWeight:600,color:col}}>{v!=null?v:"—"}{v!=null&&u?" "+u:""}</span>
          </div>
        ))}
      </CardDark>
      <Card><H1 italic>Duration — Last 7 Days</H1><LineChart pts={durP} color={C.coral} h={80}/></Card>
      {remP.length>=2&&<Card><H1 italic>REM % — Last 7 Days</H1><LineChart pts={remP} color="#7058a8" h={70}/></Card>}
      {depP.length>=2&&<Card><H1 italic>Deep Sleep % — Last 7 Days</H1><LineChart pts={depP} color="#5068b0" h={70}/></Card>}
      {awP.length>=2&&<Card><H1 italic>Awake % — Last 7 Days</H1><LineChart pts={awP} color="#b87830" h={70}/></Card>}
      {!se.length&&<div style={{textAlign:"center",padding:"60px 20px"}}><p style={{fontSize:40}}>🌙</p><p style={{fontFamily:FR,fontWeight:500,color:C.textMuted,fontStyle:"italic",marginTop:8}}>No sleep data yet</p></div>}
    </div>
  );
}

// ── Fitness ──────────────────────────────────────────────────────

function Fitness({data}) {
  const [wOff,setWOff]=useState(0);
  const wd=weekDays(wOff), wf=wd.map(d=>data[d]?.fitness||{});
  const gd=cy(wf,"gym"), rd=wf.filter(f=>f.restDay).length, wks=cy(wf,"walk"), sns=cy(wf,"sauna");
  const ts=wf.map(f=>parseFloat(f.steps||0)).filter(v=>!isNaN(v)).reduce((a,b)=>a+b,0);
  const as=wf.filter(f=>f.steps).length?Math.round(ts/wf.filter(f=>f.steps).length):null;
  const tw=wf.map(f=>parseFloat(f.water||0)).filter(v=>!isNaN(v)).reduce((a,b)=>a+b,0);
  const sP=wd.map((d,i)=>({x:d,y:parseFloat(data[d]?.fitness?.steps||0),label:["M","T","W","T","F","S","S"][i]}));
  const gW=[];
  for(let w=-7;w<=wOff;w++){const wd2=weekDays(w);const gc=wd2.filter(d=>data[d]?.fitness?.gym===true).length;const wl=new Date(wd2[0]+"T00:00:00").toLocaleDateString("default",{month:"short",day:"numeric"});gW.push({x:wd2[0],y:gc,label:wl.slice(0,5)});}
  const wl=wOff===0?"This Week":wOff===-1?"Last Week":`${Math.abs(wOff)} weeks ago`;
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>setWOff(wOff-1)} style={{background:"rgba(255,255,255,0.6)",border:`1.5px solid ${C.border}`,borderRadius:12,padding:"9px 16px",cursor:"pointer",fontFamily:FR,fontSize:12,fontWeight:700,color:C.textSoft}}>←</button>
        <p style={{fontFamily:FP,fontSize:20,fontWeight:600,color:C.plum,margin:0,fontStyle:"italic"}}>{wl}</p>
        <button onClick={()=>setWOff(Math.min(0,wOff+1))} disabled={wOff>=0} style={{background:"rgba(255,255,255,0.6)",border:`1.5px solid ${C.border}`,borderRadius:12,padding:"9px 16px",cursor:wOff>=0?"default":"pointer",fontFamily:FR,fontSize:12,fontWeight:700,color:C.textSoft,opacity:wOff>=0?0.3:1}}>→</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {[{l:"Gym sessions",v:gd,c:C.coral,bg:C.coralLight},{l:"Rest days",v:rd,c:"#7058a8",bg:"#f0eaf8"},{l:"Walks",v:wks,c:"#5a8a5a",bg:"#eaf4ea"},{l:"Sauna",v:sns,c:"#b87830",bg:"#fdf0e0"},{l:"Total water",v:`${(tw*0.5).toFixed(1)}L`,c:"#5080b8",bg:"#e8f0f8"}].map(({l,v,c,bg})=>(
          <div key={l} style={{background:bg,borderRadius:16,padding:"16px",border:`1px solid ${c}30`}}>
            <p style={{fontFamily:FR,fontSize:9,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:c,margin:"0 0 6px"}}>{l}</p>
            <p style={{fontFamily:FP,fontSize:24,fontWeight:700,color:C.plum,margin:0}}>{v}</p>
          </div>

function App() {
  const [data,setDataRaw]=useState({});
  const [profile,setProfileRaw]=useState({height:"165",cycleStart:null,cycleHist:[]});
  const [tab,setTab]=useState(0);
  const [sel,setSel]=useState(toDay());
  const [off,setOff]=useState(0);

  useEffect(()=>{
    const d=loadD(); migrate(d);
    setDataRaw(loadD()); setProfileRaw(loadP());
  },[]);

  function setData(d){setDataRaw(d);saveD(d);}
  function setProfile(p){setProfileRaw(p);saveP(p);}
  function goDay(delta){const n=off+delta;if(n>0)return;setOff(n);setSel(offDay(n));}

  const ents=Object.entries(data).sort(([a],[b])=>a.localeCompare(b));

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FR}}>
      {/* Header */}
      <div style={{background:"rgba(232,223,240,0.96)",backdropFilter:"blur(10px)",borderBottom:`1px solid ${C.border}`,padding:"16px 20px 0",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <p style={{fontFamily:FP,fontSize:22,fontWeight:600,color:C.plum,margin:0}}>My Health</p>
          <p style={{fontFamily:FR,fontSize:9,fontWeight:700,color:C.textMuted,margin:0,letterSpacing:"0.16em",textTransform:"uppercase"}}>Private</p>
        </div>
        <div style={{display:"flex",gap:0,overflowX:"auto",marginLeft:-4}}>
          {TABS.map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)} style={{padding:"8px 12px",borderRadius:"12px 12px 0 0",border:"none",background:tab===i?"rgba(255,255,255,0.6)":"transparent",color:tab===i?C.coral:C.lavDark,fontFamily:FR,fontSize:11,fontWeight:700,letterSpacing:"0.06em",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,borderBottom:tab===i?`2px solid ${C.coral}`:"2px solid transparent",transition:"all 0.2s"}}>
              {TAB_ICONS[i]} {t}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{padding:"16px 16px 100px",maxWidth:500,margin:"0 auto"}}>
        {tab===0&&<Home data={data} profile={profile} setTab={setTab}/>}
        {tab===1&&<Log data={data} setData={setData} profile={profile} setProfile={setProfile} sel={sel} off={off} goDay={goDay}/>}
        {tab===2&&<Sleep entries={ents}/>}
        {tab===3&&<Fitness data={data}/>}
        {tab===4&&<Body data={data} setData={setData} profile={profile} setProfile={setProfile}/>}
        {tab===5&&<Insights data={data} profile={profile}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
